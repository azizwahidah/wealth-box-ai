<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Box – AI Financial Advisor Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  body { background: #f4f1eb; color: #1a1a1a; display: flex; flex-direction: column; }

  /* ── TOP BAR ── */
  .topbar {
    background: #022e21;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .logo { color: #fff; font-family: 'DM Serif Display', serif; font-size: 22px; }
  .logo span { color: #CC6600; }
  .logo small { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #8fa3bc; font-weight: 400; margin-left: 10px; letter-spacing: 0.5px; }

  /* ── MAIN LAYOUT ── */
  .main { display: grid; grid-template-columns: var(--sidebar-width, 340px) 1fr; flex: 1; height: calc(100vh - 53px); grid-template-rows: 1fr; }

  /* ── SIDEBAR ── */
  .sidebar { background: #fff; border-right: 1px solid #e8e3d8; display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 0; }

  /* ── RESIZE HANDLE ── */
  .resize-handle {
    position: absolute; right: -4px; top: 0; bottom: 0; width: 8px;
    cursor: col-resize; z-index: 10; background: transparent;
  }
  .resize-handle:hover, .resize-handle.active { background: rgba(204,102,0,0.2); }

  /* ── PROFILE SWITCHER ── */
  .profile-switcher {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid #e8e3d8; cursor: pointer; transition: background 0.15s;
  }
  .profile-switcher:hover { background: #f8f6f0; }
  .switcher-arrow {
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: #f4f1eb; color: #8b7355; font-size: 11px;
    transition: transform 0.2s, background 0.2s; flex-shrink: 0;
  }
  .switcher-arrow.open { transform: rotate(180deg); background: #e6f4ef; color: #CC6600; }
  .profile-dropdown {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
    border-bottom: 1px solid #e8e3d8;
  }
  .profile-dropdown.open { max-height: 400px; overflow-y: auto; }
  .sidebar-header { padding: 18px 18px 12px; border-bottom: 1px solid #e8e3d8; }
  .sidebar-header h2 { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.8px; }
  .profile-list { padding: 10px; overflow-y: auto; flex: 1; }
  .profile-btn {
    width: 100%; background: none; border: 1px solid transparent;
    border-radius: 10px; padding: 10px 12px; cursor: pointer;
    text-align: left; display: flex; align-items: center; gap: 10px;
    margin-bottom: 5px; transition: all 0.15s;
  }
  .profile-btn:hover { background: #f8f6f0; border-color: #e8e3d8; }
  .profile-btn.active { background: #f3f9f6; border-color: #CC6600; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; flex-shrink: 0; overflow: hidden; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s; }
  .avatar.lg { width: 56px; height: 56px; font-size: 26px; }
  .avatar.xl { width: 72px; height: 72px; font-size: 34px; }
  .profile-btn:hover .avatar { transform: scale(1.1); border-color: #CC6600; }
  .profile-btn.active .avatar { border-color: #CC6600; }
  .nickname { font-size: 10px; color: #022e21; font-weight: 500; font-style: italic; display: block; margin-top: 1px; }
  .profile-name { font-size: 13px; font-weight: 500; color: #1a1a1a; display: block; }
  .profile-sub { font-size: 11px; color: #8b7355; display: block; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── PROFILE CARD ── */
  .profile-card { padding: 14px 16px; font-size: 12px; }
  .card-name { font-size: 16px; font-weight: 500; color: #022e21; margin-bottom: 2px; }
  .card-sub { font-size: 11px; color: #6b7280; margin-bottom: 12px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
  .stat { background: #f8f6f0; border-radius: 7px; padding: 8px 10px; }
  .stat-label { font-size: 10px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
  .stat-val { font-size: 12px; font-weight: 500; color: #022e21; }
  .section-label { font-size: 10px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
  .tag { display: inline-block; background: #e6f4ef; color: #CC6600; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; margin: 2px 2px 2px 0; }
  .goal-item { display: flex; align-items: flex-start; gap: 5px; margin-bottom: 3px; color: #4a4a4a; }
  .goal-dot { width: 4px; height: 4px; border-radius: 50%; background: #CC6600; margin-top: 4px; flex-shrink: 0; }
  .bio-text { font-size: 12px; color: #4a4a4a; line-height: 1.65; margin-bottom: 10px; border-left: 3px solid #CC6600; padding-left: 10px; }
  .suit-section { margin-top: 10px; border-top: 1px solid #e8e3d8; padding-top: 10px; }
  .suit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .suit-item { padding: 5px 8px; background: #faf8f4; border-radius: 5px; }
  .suit-item.full { grid-column: 1 / -1; }
  .suit-label { font-size: 9px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; }
  .suit-val { font-size: 11px; font-weight: 500; color: #022e21; }
  .suit-val.flag { color: #c0392b; }

  /* ── GAMEPLAN MODAL ── */
  .gp-overlay {
    display: none; position: fixed; inset: 0; background: rgba(2,46,33,0.5);
    z-index: 200; align-items: center; justify-content: center;
  }
  .gp-overlay.open { display: flex; }
  .gp-modal {
    background: #fff; border-radius: 16px; width: 90vw; max-width: 720px;
    max-height: 88vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden;
  }
  .gp-header {
    background: #022e21; color: #fff; padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .gp-header h2 { font-size: 16px; font-weight: 500; }
  .gp-header h2 span { color: #CC6600; }
  .gp-close {
    background: none; border: none; color: #8fa3bc; font-size: 22px;
    cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  .gp-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .gp-body { overflow-y: auto; padding: 24px; flex: 1; }
  .gp-priority {
    background: #f3f9f6; border: 1px solid #a8d4c2; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 20px; font-size: 12px; color: #CC6600; line-height: 1.6;
  }
  .gp-priority strong { color: #022e21; }

  /* Steps */
  .gp-steps { position: relative; padding-left: 28px; }
  .gp-steps::before {
    content: ''; position: absolute; left: 11px; top: 0; bottom: 0;
    width: 2px; background: #e8e3d8;
  }
  .gp-step {
    position: relative; margin-bottom: 20px; cursor: pointer;
    border: 1px solid #e8e3d8; border-radius: 10px; padding: 14px 16px;
    transition: all 0.2s;
  }
  .gp-step:hover { border-color: #CC6600; background: #f7faf8; }
  .gp-step.expanded { background: #f7faf8; border-color: #CC6600; }
  .gp-num {
    position: absolute; left: -28px; top: 14px;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; z-index: 1;
  }
  .gp-num.done { background: #CC6600; color: #fff; }
  .gp-num.active { background: #022e21; color: #fff; }
  .gp-num.pending { background: #e8e3d8; color: #8b7355; }
  .gp-step-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .gp-step-title { font-size: 14px; font-weight: 500; color: #022e21; }
  .gp-badge {
    font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0;
  }
  .gp-badge.done { background: #d4e8dc; color: #CC6600; }
  .gp-badge.active { background: #dce8fb; color: #1a4a8a; }
  .gp-badge.pending { background: #f4f1eb; color: #8b7355; }
  .gp-step-date { font-size: 11px; color: #8b7355; margin-top: 2px; }
  .gp-step-detail {
    display: none; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #e8e3d8;
  }
  .gp-step.expanded .gp-step-detail { display: block; }
  .gp-step-desc { font-size: 12px; color: #4a4a4a; line-height: 1.65; margin-bottom: 10px; }
  .gp-progress-wrap { margin-bottom: 8px; }
  .gp-progress-bar {
    height: 6px; background: #e8e3d8; border-radius: 3px; overflow: hidden;
  }
  .gp-progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .gp-progress-fill.done { background: #CC6600; }
  .gp-progress-fill.active { background: #1a4a8a; }
  .gp-progress-fill.pending { background: #c9c2b4; }
  .gp-meta { font-size: 11px; color: #8b7355; display: flex; gap: 14px; flex-wrap: wrap; }

  /* Chart */
  .gp-chart { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e8e3d8; }
  .gp-chart h3 { font-size: 13px; font-weight: 500; color: #022e21; margin-bottom: 12px; }
  .gp-chart svg { width: 100%; height: 220px; }
  .gp-chart-area { fill: url(#areaGrad); }
  .gp-chart-line { fill: none; stroke: #CC6600; stroke-width: 2.5; }
  .gp-chart-dot { fill: #CC6600; }
  .gp-chart-label { font-size: 10px; fill: #8b7355; font-family: 'DM Sans', sans-serif; }
  .gp-chart-val { font-size: 9px; fill: #022e21; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .gp-chart-zero { stroke: #ccc; stroke-width: 1; stroke-dasharray: 4 3; }
  .gp-chart-grid { stroke: #f0ede6; stroke-width: 1; }

  /* Gameplan button */
  .gp-open-btn {
    width: 100%; margin-top: 10px; padding: 9px; border-radius: 8px;
    border: 1px solid #CC6600; background: #f3f9f6; color: #CC6600;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .gp-open-btn:hover { background: #CC6600; color: #fff; }

  /* ── CHAT AREA ── */
  .chat-area { display: flex; flex-direction: column; background: #f4f1eb; min-height: 0; height: 100%; overflow: hidden; }
  .chat-header { background: #fff; border-bottom: 1px solid #e8e3d8; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
  .chat-header-info h3 { font-size: 14px; font-weight: 500; color: #022e21; }
  .chat-header-info p { font-size: 11px; color: #6b7280; }
  .status-badge { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: #CC6600; font-weight: 500; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #CC6600; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(204,102,0,0.4); } 50% { box-shadow: 0 0 0 5px rgba(204,102,0,0); } }
  @keyframes nudge { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-6px); } }
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 24px; }
  .empty-title { font-size: 16px; font-weight: 500; color: #022e21; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: #8b7355; line-height: 1.6; max-width: 280px; margin-bottom: 18px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .sugg-btn {
    background: #fff; border: 1px solid #e8e3d8; border-radius: 20px;
    padding: 7px 13px; font-size: 12px; color: #022e21; cursor: pointer; transition: all 0.15s;
  }
  .sugg-btn:hover { background: #f3f9f6; border-color: #CC6600; color: #CC6600; }
  .msg { display: flex; gap: 8px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }
  .bubble { padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.7; }
  .msg.ai .bubble { background: #fff; border: 1px solid #e8e3d8; color: #1a1a1a; border-bottom-left-radius: 3px; max-width: 100%; }
  .msg.user .bubble { background: #022e21; color: #fff; border-bottom-right-radius: 3px; white-space: pre-wrap; }
  .msg-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .ai-av { background: #e6f4ef; color: #CC6600; }
  .user-av { background: #e8e3d8; color: #555; }
  .typing { display: flex; gap: 4px; padding: 10px 14px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  @keyframes wave { 0%,100% { transform: rotate(0deg); } 15% { transform: rotate(14deg); } 30% { transform: rotate(-8deg); } 45% { transform: rotate(14deg); } 60% { transform: rotate(-4deg); } 75% { transform: rotate(10deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .profile-btn { animation: fadeIn 0.3s ease-out both; }
  .profile-btn:nth-child(1) { animation-delay: 0.05s; }
  .profile-btn:nth-child(2) { animation-delay: 0.1s; }
  .profile-btn:nth-child(3) { animation-delay: 0.15s; }
  .profile-btn:nth-child(4) { animation-delay: 0.2s; }
  .profile-btn:nth-child(5) { animation-delay: 0.25s; }
  .profile-btn:nth-child(6) { animation-delay: 0.3s; }
  .msg { animation: fadeIn 0.25s ease-out; }
  .sugg-btn { transition: all 0.2s; }
  .sugg-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(204,102,0,0.15); }
  .disclaimer { font-size: 10px; color: #aaa; text-align: center; padding: 5px 20px; background: #fff; border-top: 1px solid #e8e3d8; }
  .input-row { background: #fff; border-top: 1px solid #e8e3d8; padding: 12px 20px; display: flex; gap: 8px; align-items: flex-end; }
  .chat-input {
    flex: 1; border: 1px solid #e8e3d8; border-radius: 9px;
    padding: 9px 13px; font-size: 13px; resize: none; outline: none;
    color: #1a1a1a; background: #fafaf8; line-height: 1.5; max-height: 90px;
  }
  .chat-input:focus { border-color: #CC6600; background: #fff; }
  .send-btn {
    background: #022e21; color: #fff; border: none; border-radius: 9px;
    padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .no-profile { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #8b7355; gap: 8px; font-size: 13px; }

  /* ── MOBILE TOGGLE ── */
  .mobile-toggle { display: none; }
  .back-btn { display: none; }

  /* ── MOBILE RESPONSIVE ── */
  @media (max-width: 768px) {
    .topbar { padding: 10px 16px; }
    .logo { font-size: 18px; }
    .logo small { display: none; }
    .main { grid-template-columns: 1fr; height: calc(100vh - 47px); }
    .sidebar { position: absolute; inset: 0; top: 47px; z-index: 100; display: flex; }
    .sidebar.hidden { display: none; }
    .chat-area { position: absolute; inset: 0; top: 47px; z-index: 99; }
    .chat-area.hidden { display: none; }
    .mobile-toggle { display: flex; }
    .back-btn {
      display: flex; align-items: center; gap: 4px; background: none; border: none;
      color: #CC6600; font-size: 12px; font-weight: 500; cursor: pointer; padding: 0; margin-right: 6px;
    }
    .resize-handle { display: none; }
    .avatar.xl { width: 56px; height: 56px; font-size: 28px; }
    .chat-header { flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
    .chat-header-info h3 { font-size: 13px; }
    .input-row { padding: 8px 12px; }
    .messages { padding: 12px 14px; }
    .form-row { grid-template-columns: 1fr; }
  }

  /* ── ADD MEMBER MODAL ── */
  .add-btn {
    width: 100%; background: none; border: 1px dashed #c3d8cc; border-radius: 10px;
    padding: 10px 12px; cursor: pointer; text-align: center; color: #CC6600;
    font-size: 13px; font-weight: 500; transition: all 0.15s; margin-bottom: 5px;
  }
  .add-btn:hover { background: #f3f9f6; border-color: #CC6600; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(2,46,33,0.5);
    z-index: 300; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; width: 90vw; max-width: 480px;
    max-height: 88vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden;
  }
  .modal-header {
    background: #022e21; color: #fff; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-size: 15px; font-weight: 500; }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; display: block; }
  .form-label .req { color: #c0392b; }
  .form-input, .form-select {
    width: 100%; border: 1px solid #e8e3d8; border-radius: 8px;
    padding: 8px 12px; font-size: 13px; color: #1a1a1a; background: #fafaf8;
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: #CC6600; background: #fff; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-section { font-size: 10px; font-weight: 600; color: #8b7355; text-transform: uppercase; letter-spacing: 0.6px; margin: 18px 0 10px; padding-top: 14px; border-top: 1px solid #e8e3d8; }
  .form-footer { padding: 14px 20px; border-top: 1px solid #e8e3d8; display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    background: none; border: 1px solid #e8e3d8; border-radius: 8px;
    padding: 8px 18px; font-size: 13px; color: #6b7280; cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: #aaa; }
  .btn-save {
    background: #022e21; color: #fff; border: none; border-radius: 8px;
    padding: 8px 22px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Wealth <span>Box</span> <small>AI FINANCIAL ADVISOR DEMO</small></div>
  <div style="display:flex;align-items:center;gap:14px">
    <span style="font-size:11px;color:#8fa3bc;display:flex;align-items:center;gap:5px">
      <span style="width:7px;height:7px;border-radius:50%;background:#CC6600;display:inline-block"></span>
      <span id="memberCount">6 Members Loaded</span>
    </span>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div id="sidebarSwitcher"></div>
    <div class="profile-dropdown" id="profileDropdown">
      <div class="profile-list" id="profileList"></div>
    </div>
    <div id="profileCard" style="flex:1;min-height:0;overflow-y:auto"></div>
    <div class="resize-handle" id="resizeHandle"></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="no-profile">
      <div style="font-size:32px;opacity:0.25">👤</div>
      <div style="font-weight:600;color:#022e21;font-size:16px">Select a member profile or add your own</div>
      <div>to start an AI-powered financial conversation</div>
      <div style="margin-top:24px;display:flex;align-items:center;gap:14px">
        <span style="font-size:54px;line-height:1;color:#022e21;animation:nudge 1.5s ease-in-out infinite">&larr;</span>
        <div style="text-align:left">
          <div style="font-size:13px;color:#022e21;font-weight:600">Pick one from the list</div>
          <div style="font-size:11px;color:#8b7355">or hit &ldquo;+ Add&rdquo; at the top</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   PROFILES — edit these freely!
   Each profile has: name, age, job, status,

/* ─────────────────────────────────────────
   PROFILE COMPLETENESS CALCULATOR
───────────────────────────────────────── */
function getProfileCompleteness(p) {
  const fields = [
    p.name, p.age, p.job,
    p.status !== 'Unknown' ? p.status : null,
    p.hh,
    p.inc,
    p.own !== null ? 'yes' : null,
    Object.keys(p.debt).length > 0 ? 'yes' : null,
    p.accs.length > 0 ? 'yes' : null,
    p.goals.length > 0 && p.goals[0] !== 'Get my finances together' ? 'yes' : null,
    p.bio && !p.bio.includes("hasn't completed") ? 'yes' : null,
    p.suitability.riskTolerance !== 'Unknown' ? 'yes' : null,
    p.suitability.investmentExperience !== 'Unknown' ? 'yes' : null,
    p.suitability.investmentObjective !== 'Unknown' ? 'yes' : null,
    p.suitability.timeHorizon !== 'Unknown' ? 'yes' : null,
    p.suitability.liquidNetWorth !== null ? 'yes' : null,
    p.suitability.totalNetWorth !== null ? 'yes' : null,
    p.suitability.monthlyExpenses !== null ? 'yes' : null,
    p.suitability.emergencyFund !== 'Unknown' ? 'yes' : null,
    p.suitability.taxBracket !== 'Unknown' ? 'yes' : null,
    p.suitability.filingStatus !== 'Unknown' ? 'yes' : null,
    p.suitability.dependents !== 'Unknown' ? 'yes' : null,
    p.suitability.hasLifeInsurance !== 'Unknown' ? 'yes' : null,
    p.suitability.hasDisabilityInsurance !== 'Unknown' ? 'yes' : null,
    p.suitability.hasEstatePlan !== 'Unknown' ? 'yes' : null,
    p.suitability.employmentStability !== 'Unknown' ? 'yes' : null,
    p.gameplan.length > 0 ? 'yes' : null,
  ];
  const filled = fields.filter(f => f !== null && f !== undefined).length;
  return Math.round((filled / fields.length) * 100);
}

const fmt = n => '$' + n.toLocaleString();
const debtTotal = p => Object.values(p.debt).reduce((a, b) => a + b, 0);

/* Format AI responses: markdown → styled HTML + progress bars */
function formatResponse(text) {
  // Progress bars: [PROGRESS: 4800/19200 "Emergency Fund"]
  text = text.replace(/\[PROGRESS:\s*(\d+)\s*\/\s*(\d+)\s*"([^"]+)"\]/g, (_, cur, target, label) => {
    const c = parseInt(cur), t = parseInt(target);
    const pct = Math.min(100, Math.round((c / t) * 100));
    const barColor = pct >= 75 ? '#CC6600' : pct >= 40 ? '#f0c040' : '#e74c3c';
    return `<div style="margin:10px 0">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="font-weight:600;color:#022e21">${label}</span>
        <span style="color:#6b7280">$${c.toLocaleString()} / $${t.toLocaleString()} (${pct}%)</span>
      </div>
      <div style="height:10px;background:#e8e3d8;border-radius:5px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:5px;transition:width 0.4s"></div>
      </div>
    </div>`;
  });

  // Comparison bars: [COMPARE: 600 "Interest you're paying" vs 600 "Could be investing"]
  text = text.replace(/\[COMPARE:\s*(\d+)\s*"([^"]+)"\s*vs\s*(\d+)\s*"([^"]+)"\]/g, (_, v1, l1, v2, l2) => {
    const n1 = parseInt(v1), n2 = parseInt(v2);
    const max = Math.max(n1, n2);
    return `<div style="margin:10px 0;display:flex;gap:8px;align-items:center">
      <div style="flex:1">
        <div style="font-size:10px;color:#c0392b;margin-bottom:2px">${l1}</div>
        <div style="height:8px;background:#fde8e8;border-radius:4px;overflow:hidden"><div style="height:100%;width:${(n1/max)*100}%;background:#e74c3c;border-radius:4px"></div></div>
        <div style="font-size:11px;font-weight:600;color:#c0392b;margin-top:1px">$${n1.toLocaleString()}/yr</div>
      </div>
      <div style="font-size:10px;color:#8b7355">vs</div>
      <div style="flex:1">
        <div style="font-size:10px;color:#CC6600;margin-bottom:2px">${l2}</div>
        <div style="height:8px;background:#d4e8dc;border-radius:4px;overflow:hidden"><div style="height:100%;width:${(n2/max)*100}%;background:#CC6600;border-radius:4px"></div></div>
        <div style="font-size:11px;font-weight:600;color:#CC6600;margin-top:1px">$${n2.toLocaleString()}/yr</div>
      </div>
    </div>`;
  });

  // Strip # headers but keep text
  text = text.replace(/^#{1,3}\s+(.+)/gm, '$1');
  // em dashes → commas
  text = text.replace(/—/g, ', ');
  // Bold: **text** → <strong>
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#022e21">$1</strong>');
  // Italic: *text* → <em>
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Bullet points: - item → styled bullet
  text = text.replace(/^[-•]\s+(.+)/gm, '<div style="display:flex;gap:8px;align-items:flex-start;margin:3px 0"><span style="color:#CC6600;font-weight:bold;flex-shrink:0">•</span><span>$1</span></div>');
  // Code: `text` → styled span
  text = text.replace(/`([^`]+)`/g, '<span style="background:#f4f1eb;padding:1px 5px;border-radius:4px;font-size:12px">$1</span>');
  // Newlines → <br>
  text = text.replace(/\n\n/g, '<br><br>');
  text = text.replace(/\n/g, '<br>');

  return text;
}

- INVISIBLE MONEY: Money you never see. It auto-transfers the day after payday to bills, savings, investments, and goal accounts. Gone before your brain can negotiate.
- VISIBLE MONEY: What's left after invisible money moves. This is guilt-free spending money. Spend it to zero if you want.

Step 1 — Set Up Separate Accounts (each account has ONE job):
1. Paycheck Account: Where direct deposit lands. Does nothing else. It's your "lookout tower" — you see exactly what came in (paycheck, bonus, raise) before anything moves.

3. High-Yield Savings Account (HYSA): Emergency fund. Use a DIFFERENT bank than checking (e.g., Vio Bank, Marcus, Ally). The friction of a separate login makes it harder to touch.

- Day 2: Whatever's left transfers to Spending Account.

function renderProjectionChart(projections) {
  const pad = { top: 30, right: 20, bottom: 35, left: 55 };
  const w = 660, h = 220;
  const iw = w - pad.left - pad.right;
  const ih = h - pad.top - pad.bottom;

  const vals = projections.map(p => p.netWorth);
  const minV = Math.min(0, ...vals);
  const maxV = Math.max(...vals);
  const range = maxV - minV || 1;

  const xStep = iw / (projections.length - 1);
  const toX = i => pad.left + i * xStep;
  const toY = v => pad.top + ih - ((v - minV) / range) * ih;

  const points = projections.map((p, i) => `${toX(i)},${toY(p.netWorth)}`);
  const linePath = 'M' + points.join(' L');
  const areaPath = linePath + ` L${toX(projections.length - 1)},${toY(minV)} L${toX(0)},${toY(minV)} Z`;

  const zeroY = toY(0);
  const showZero = minV < 0;

  const gridLines = [];
  const gridCount = 4;
  for (let i = 0; i <= gridCount; i++) {
    const v = minV + (range * i / gridCount);
    const y = toY(v);
    gridLines.push(`<line x1="${pad.left}" y1="${y}" x2="${w - pad.right}" y2="${y}" class="gp-chart-grid"/>`);
    const label = v >= 1000 || v <= -1000 ? (v / 1000).toFixed(0) + 'K' : v.toFixed(0);
    gridLines.push(`<text x="${pad.left - 8}" y="${y + 3}" text-anchor="end" class="gp-chart-label">$${label}</text>`);
  }

  const labels = projections.map((p, i) =>
    `<text x="${toX(i)}" y="${h - 8}" text-anchor="middle" class="gp-chart-label">${p.year}</text>`
  ).join('');

  const dots = projections.map((p, i) => {
    const valStr = p.netWorth >= 1000000 ? '$' + (p.netWorth / 1000000).toFixed(1) + 'M'
      : p.netWorth >= 1000 || p.netWorth <= -1000 ? '$' + (p.netWorth / 1000).toFixed(0) + 'K'
      : '$' + p.netWorth;
    return `<circle cx="${toX(i)}" cy="${toY(p.netWorth)}" r="3.5" class="gp-chart-dot"/>
      <text x="${toX(i)}" y="${toY(p.netWorth) - 8}" text-anchor="middle" class="gp-chart-val">${valStr}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC6600" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#CC6600" stop-opacity="0.02"/>
    </linearGradient></defs>
    ${gridLines.join('')}
    ${showZero ? `<line x1="${pad.left}" y1="${zeroY}" x2="${w - pad.right}" y2="${zeroY}" class="gp-chart-zero"/>` : ''}
    <path d="${areaPath}" class="gp-chart-area"/>
    <path d="${linePath}" class="gp-chart-line"/>
    ${dots}
    ${labels}
  </svg>`;
}

function saveMember() {
  const name = document.getElementById('fm-name').value.trim();

  }

  const hh = document.getElementById('fm-hh').value ? parseInt(document.getElementById('fm-hh').value) : null;
  const ownVal = document.getElementById('fm-own').value;
  const own = ownVal === 'yes' ? true : ownVal === 'no' ? false : false;

  // Build debt object
  const debt = {};
  const cc = parseInt(document.getElementById('fm-cc').value) || 0;
  const sl = parseInt(document.getElementById('fm-sl').value) || 0;
  const car = parseInt(document.getElementById('fm-car').value) || 0;
  const mort = parseInt(document.getElementById('fm-mort').value) || 0;
  if (cc > 0) debt['Credit Card'] = cc;
  if (sl > 0) debt['Student Loans'] = sl;
  if (car > 0) debt['Car Loan'] = car;
  if (mort > 0) debt['Mortgage'] = mort;

  const accsRaw = document.getElementById('fm-accs').value.trim();

  const goalsRaw = document.getElementById('fm-goals').value.trim();

  const nameParts = name.split(' ');
  const ini = (nameParts[0][0] + (nameParts[1] ? nameParts[1][0] : '')).toUpperCase();

  const emoji = MEMBER_EMOJIS[Math.floor(Math.random() * MEMBER_EMOJIS.length)];

  const newId = Math.max(...PROFILES.map(p => p.id)) + 1;

  const hasUnknowns = status === 'Unknown' || hh === null || ownVal === 'unknown';

  const newProfile = {
    id: newId, name, age, ini, bg: colorSet.bg, fg: colorSet.fg,
    nick: "New Member", emoji,
    job, status, hh, inc: income, own,
    debt, accs, goals,

    bio,

      investmentExperience: "Unknown",
      investmentObjective: "Unknown",
      timeHorizon: "Unknown",
      liquidNetWorth: null,
      totalNetWorth: null,
      monthlyExpenses: null,
      emergencyFund: "Unknown",

function saveCustomProfiles() {
  const custom = PROFILES.filter(p => p.id > 6);
  localStorage.setItem('wealthbox_custom_profiles', JSON.stringify(custom));
}

function loadCustomProfiles() {
  const saved = JSON.parse(localStorage.getItem('wealthbox_custom_profiles') || '[]');
  saved.forEach(p => {
    if (!PROFILES.find(ex => ex.id === p.id)) {
      PROFILES.push(p);
    }
  });
}

/* ── SUB-GOAL TOGGLE STATE ── */
function getSubGoalOverrides() {
  return JSON.parse(localStorage.getItem('wealthbox_subgoal_state') || '{}');
}

function getEffectiveEnabled(profile, subGoal) {
  const overrides = getSubGoalOverrides();
  if (overrides[profile.id] && subGoal.id in overrides[profile.id]) {
    return overrides[profile.id][subGoal.id];
  }
  return !!subGoal.enabled;
}

function toggleSubGoal(profileId, subGoalId) {
  const profile = PROFILES.find(p => p.id === profileId);
  if (!profile || !profile.subGoals) return;
  const sg = profile.subGoals.find(s => s.id === subGoalId);
  if (!sg) return;
  const overrides = getSubGoalOverrides();
  if (!overrides[profileId]) overrides[profileId] = {};
  overrides[profileId][subGoalId] = !getEffectiveEnabled(profile, sg);
  localStorage.setItem('wealthbox_subgoal_state', JSON.stringify(overrides));
  renderCard(profile);
}

function enabledSubGoals(profile) {
  if (!profile.subGoals) return [];
  return profile.subGoals.filter(sg => getEffectiveEnabled(profile, sg));
}

function formatSubGoalCost(sg) {
  if (sg.cadence === 'monthly') return '$' + sg.cost.toLocaleString() + '/mo · ' + sg.horizon;
  return '$' + sg.cost.toLocaleString() + ' · ' + sg.horizon;
}

function updateMemberCount() {
  const countEl = document.getElementById('memberCount');
  if (countEl) countEl.textContent = PROFILES.length + ' Members Loaded';
}

/* ─────────────────────────────────────────
   AUTO-GREETING
───────────────────────────────────────── */
function sendAutoGreeting() {
  if (!current || messages.length > 0) return;
  const p = current;
  const pct = getProfileCompleteness(p);
  let greeting;

  if (pct < 50) {
    greeting = `Hey ${p.name.split(' ')[0]}! 👋 Welcome to Wealth Box. I can see we're just getting started with your profile, so I've got some of your basics but I'll need a bit more info to give you the best advice. Ask me anything and I'll let you know what I need along the way.`;
  } else if (pct < 100) {
    greeting = `Hey ${p.name.split(' ')[0]}! 👋 I've got most of your financial picture loaded up. I can see you're working as a ${p.job} making ${fmt(p.inc)}/yr, and your top goal is to ${p.goals[0].toLowerCase()}. I'm missing a few details, but we can definitely get started. What's on your mind?`;
  } else {
    const topGoal = p.goals[0].toLowerCase();
    const debtAmt = debtTotal(p);
    greeting = debtAmt > 0
      ? `Hey ${p.name.split(' ')[0]}! 👋 I've got your full financial profile loaded. I can see you're carrying ${fmt(debtAmt)} in debt and your big goal is to ${topGoal}. I've got some thoughts on how to get you there. What do you want to tackle first?`
      : `Hey ${p.name.split(' ')[0]}! 👋 I've got your full financial profile loaded. You're in solid shape and your focus is on ${topGoal}. Let's make a plan. What's on your mind?`;
  }

  // Show typing dots first, then type in the greeting
  messages.push({ role: 'assistant', content: '' });
  loading = true;
  renderChat();

  setTimeout(() => {
    loading = false;
    renderChat();
    let charIndex = 0;
    const msgContainer = document.getElementById('messages');
    const bubbles = msgContainer.querySelectorAll('.msg.ai .bubble');
    const targetBubble = bubbles[bubbles.length - 1];
    let rawSoFar = '';

    typingInterval = setInterval(() => {
      if (charIndex < greeting.length) {
        const chunkSize = Math.floor(Math.random() * 4) + 2;
        rawSoFar += greeting.slice(charIndex, charIndex + chunkSize);
        charIndex += chunkSize;
        messages[messages.length - 1].content = rawSoFar;
        if (targetBubble) targetBubble.innerHTML = formatResponse(rawSoFar);
        if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
      } else {
        clearInterval(typingInterval);
        typingInterval = null;
        messages[messages.length - 1].content = greeting;
        renderChat();
      }
    }, 12);
  }, 800);
}

  if (!current) return;

function updateMember(id) {
  const name = document.getElementById('fm-name').value.trim();
  const age = parseInt(document.getElementById('fm-age').value);
  const job = document.getElementById('fm-job').value.trim();
  const income = parseInt(document.getElementById('fm-income').value);

  if (!name || !age || !job || !income) {
    alert('Please fill in the required fields: Name, Age, Occupation, and Income.');
    return;
  }

  const p = PROFILES.find(pr => pr.id === id);
  if (!p) return;

  const status = document.getElementById('fm-status').value;
  const hh = document.getElementById('fm-hh').value ? parseInt(document.getElementById('fm-hh').value) : null;
  const ownVal = document.getElementById('fm-own').value;

  p.name = name;
  p.age = age;
  p.job = job;
  p.inc = income;
  p.status = status;
  p.hh = hh;
  p.own = ownVal === 'yes' ? true : ownVal === 'no' ? false : false;
  p.sub = `${job} · $${income.toLocaleString()}`;

  // Update debt
  p.debt = {};
  const cc = parseInt(document.getElementById('fm-cc').value) || 0;
  const sl = parseInt(document.getElementById('fm-sl').value) || 0;
  const car = parseInt(document.getElementById('fm-car').value) || 0;
  const mort = parseInt(document.getElementById('fm-mort').value) || 0;
  if (cc > 0) p.debt['Credit Card'] = cc;
  if (sl > 0) p.debt['Student Loans'] = sl;
  if (car > 0) p.debt['Car Loan'] = car;
  if (mort > 0) p.debt['Mortgage'] = mort;

  const accsRaw = document.getElementById('fm-accs').value.trim();
  p.accs = accsRaw ? accsRaw.split(',').map(a => a.trim()).filter(a => a) : ['Checking'];

  const goalsRaw = document.getElementById('fm-goals').value.trim();
  p.goals = goalsRaw ? goalsRaw.split(',').map(g => g.trim()).filter(g => g) : ['Get finances organized'];

  p.bio = document.getElementById('fm-bio').value.trim() || p.bio;

  // Update suitability fields that can be inferred
  if (status !== 'Unknown') p.suitability.filingStatus = status === 'Married' ? 'Married Filing Jointly' : 'Single';
  if (hh && hh > 1) p.suitability.dependents = `${hh - 1} dependent(s)`;

  const nameParts = name.split(' ');
  p.ini = (nameParts[0][0] + (nameParts[1] ? nameParts[1][0] : '')).toUpperCase();

  if (p.id > 6) saveCustomProfiles();
  closeAddMember();
  renderList();
  renderCard(p);
  renderChat();
}

/* ─────────────────────────────────────────
   DELETE PROFILE
───────────────────────────────────────── */
function deleteProfile(id) {
  const p = PROFILES.find(pr => pr.id === id);
  if (!p) return;
  if (p.id <= 6) return;
  if (!confirm(`Delete ${p.name}'s profile? This can't be undone.`)) return;

  const idx = PROFILES.findIndex(pr => pr.id === id);
  PROFILES.splice(idx, 1);

  // Clear their chat history
  const allChats = JSON.parse(localStorage.getItem('wealthbox_chats') || '{}');
  delete allChats[id];
  localStorage.setItem('wealthbox_chats', JSON.stringify(allChats));

  if (id > 6) saveCustomProfiles();

  if (current && current.id === id) {
    current = null;
    messages = [];
  }
  updateMemberCount();
  renderList();
  document.getElementById('profileCard').innerHTML = '';
  renderChat();
}

/* ─────────────────────────────────────────
   EXPORT CONVERSATION
───────────────────────────────────────── */
function exportChat() {
  if (!current || messages.length === 0) return;
  const p = current;
  const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  let text = `WEALTH BOX - Financial Conversation Export\n`;
  text += `Member: ${p.name} | ${p.job} | ${fmt(p.inc)}/yr\n`;
  text += `Date: ${date}\n`;
  text += `${'─'.repeat(50)}\n\n`;

  messages.forEach(m => {
    const label = m.role === 'user' ? 'YOU' : 'AI ADVISOR';
    // Strip markdown for plain text export
    const clean = m.content
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/\[PROGRESS:[^\]]+\]/g, '')
      .replace(/\[COMPARE:[^\]]+\]/g, '');
    text += `${label}:\n${clean}\n\n`;
  });

  text += `${'─'.repeat(50)}\n`;
  text += `For educational purposes only. Not professional financial advice.\n`;
  text += `Generated by Wealth Box AI Financial Advisor Demo`;

  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wealthbox-${p.name.replace(/\s+/g, '-').toLowerCase()}-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ─────────────────────────────────────────
   RESIZE HANDLE (drag to resize sidebar)
───────────────────────────────────────── */
(function() {
  const handle = document.getElementById('resizeHandle');
  const main = document.querySelector('.main');
  let dragging = false;

  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const newWidth = Math.min(600, Math.max(260, e.clientX));
    main.style.setProperty('--sidebar-width', newWidth + 'px');
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      handle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // Touch support for mobile
  handle.addEventListener('touchstart', (e) => {
    dragging = true;
    handle.classList.add('active');
  });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const touch = e.touches[0];
    const newWidth = Math.min(600, Math.max(260, touch.clientX));
    main.style.setProperty('--sidebar-width', newWidth + 'px');
  });

  document.addEventListener('touchend', () => {
    if (dragging) {
      dragging = false;
      handle.classList.remove('active');
    }
  });
})();

    <div class="form-footer">
      <button class="btn-cancel" onclick="closeAddMember()">Cancel</button>
      <button class="btn-save" id="addMemberSaveBtn" onclick="saveMember()">Add Member</button>
    </div>
  </div>
</div>

</body>
</html>
