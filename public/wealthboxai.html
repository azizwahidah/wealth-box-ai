<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Box – AI Financial Advisor Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  body { background: #f4f1eb; color: #1a1a1a; display: flex; flex-direction: column; }

  /* ── TOP BAR ── */
  .topbar {
    background: #022e21;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .logo { color: #fff; font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.15; }
  .logo span { color: #CC6600; }
  .logo .logo-name { display: block; }
  .logo .logo-demo { display: inline-block; background: rgba(204, 102, 0, 0.18); color: #f0a050; font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.9px; padding: 2px 7px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
  .logo .logo-tag { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #d4b896; font-weight: 400; font-style: italic; margin-top: 2px; letter-spacing: 0.2px; }

  /* ── MAIN LAYOUT ── */
  .main { display: grid; grid-template-columns: var(--sidebar-width, 340px) 1fr; flex: 1; height: calc(100vh - 53px); grid-template-rows: 1fr; }

  /* ── SIDEBAR ── */
  .sidebar { background: #fff; border-right: 1px solid #e8e3d8; display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 0; }

  /* ── RESIZE HANDLE ── */
  .resize-handle {
    position: absolute; right: -4px; top: 0; bottom: 0; width: 8px;
    cursor: col-resize; z-index: 10; background: transparent;
  }
  .resize-handle:hover, .resize-handle.active { background: rgba(204,102,0,0.2); }

  /* ── PROFILE SWITCHER ── */
  .profile-switcher {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid #e8e3d8; cursor: pointer; transition: background 0.15s;
  }
  .profile-switcher:hover { background: #f8f6f0; }
  .switcher-arrow {
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: #f4f1eb; color: #8b7355; font-size: 11px;
    transition: transform 0.2s, background 0.2s; flex-shrink: 0;
  }
  .switcher-arrow.open { transform: rotate(180deg); background: #e6f4ef; color: #CC6600; }
  .profile-dropdown {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
    border-bottom: 1px solid #e8e3d8;
  }
  .profile-dropdown.open { max-height: 400px; overflow-y: auto; }
  .sidebar-header { padding: 18px 18px 12px; border-bottom: 1px solid #e8e3d8; }
  .sidebar-header h2 { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.8px; }
  .profile-list { padding: 10px; overflow-y: auto; flex: 1; }
  .profile-btn {
    width: 100%; background: none; border: 1px solid transparent;
    border-radius: 10px; padding: 10px 12px; cursor: pointer;
    text-align: left; display: flex; align-items: center; gap: 10px;
    margin-bottom: 5px; transition: all 0.15s;
  }
  .profile-btn:hover { background: #f8f6f0; border-color: #e8e3d8; }
  .profile-btn.active { background: #f3f9f6; border-color: #CC6600; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; flex-shrink: 0; overflow: hidden; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s; }
  .avatar.lg { width: 56px; height: 56px; font-size: 26px; }
  .avatar.xl { width: 72px; height: 72px; font-size: 34px; }
  .profile-btn:hover .avatar { transform: scale(1.1); border-color: #CC6600; }
  .profile-btn.active .avatar { border-color: #CC6600; }
  .nickname { font-size: 10px; color: #022e21; font-weight: 500; font-style: italic; display: block; margin-top: 1px; }
  .profile-name { font-size: 13px; font-weight: 500; color: #1a1a1a; display: block; }
  .profile-sub { font-size: 11px; color: #8b7355; display: block; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── PROFILE CARD ── */
  .profile-card { padding: 14px 16px; font-size: 12px; }
  .card-name { font-size: 16px; font-weight: 500; color: #022e21; margin-bottom: 2px; }
  .card-sub { font-size: 11px; color: #6b7280; margin-bottom: 12px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
  .stat { background: #f8f6f0; border-radius: 7px; padding: 8px 10px; }
  .stat-label { font-size: 10px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
  .stat-val { font-size: 12px; font-weight: 500; color: #022e21; }
  .section-label { font-size: 10px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
  .tag { display: inline-block; background: #e6f4ef; color: #CC6600; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; margin: 2px 2px 2px 0; }
  .goal-item { display: flex; align-items: flex-start; gap: 5px; margin-bottom: 3px; color: #4a4a4a; }
  .goal-dot { width: 4px; height: 4px; border-radius: 50%; background: #CC6600; margin-top: 4px; flex-shrink: 0; }
  .bio-text { font-size: 12px; color: #4a4a4a; line-height: 1.65; margin-bottom: 10px; border-left: 3px solid #CC6600; padding-left: 10px; }
  .suit-section { margin-top: 10px; border-top: 1px solid #e8e3d8; padding-top: 10px; }
  .suit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .suit-item { padding: 5px 8px; background: #faf8f4; border-radius: 5px; }
  .suit-item.full { grid-column: 1 / -1; }
  .suit-label { font-size: 9px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; }
  .suit-val { font-size: 11px; font-weight: 500; color: #022e21; }
  .suit-val.flag { color: #c0392b; }

  /* ── GAMEPLAN MODAL ── */
  .gp-overlay {
    display: none; position: fixed; inset: 0; background: rgba(2,46,33,0.5);
    z-index: 200; align-items: center; justify-content: center;
  }
  .gp-overlay.open { display: flex; }
  .gp-modal {
    background: #fff; border-radius: 16px; width: 90vw; max-width: 720px;
    max-height: 88vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden;
  }
  .gp-header {
    background: #022e21; color: #fff; padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .gp-header h2 { font-size: 16px; font-weight: 500; }
  .gp-header h2 span { color: #CC6600; }
  .gp-close {
    background: none; border: none; color: #8fa3bc; font-size: 22px;
    cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  .gp-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .gp-body { overflow-y: auto; padding: 24px; flex: 1; }
  .gp-priority {
    background: #f3f9f6; border: 1px solid #a8d4c2; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 20px; font-size: 12px; color: #CC6600; line-height: 1.6;
  }
  .gp-priority strong { color: #022e21; }

  /* Steps */
  .gp-steps { position: relative; padding-left: 28px; }
  .gp-steps::before {
    content: ''; position: absolute; left: 11px; top: 0; bottom: 0;
    width: 2px; background: #e8e3d8;
  }
  .gp-step {
    position: relative; margin-bottom: 20px; cursor: pointer;
    border: 1px solid #e8e3d8; border-radius: 10px; padding: 14px 16px;
    transition: all 0.2s;
  }
  .gp-step:hover { border-color: #CC6600; background: #f7faf8; }
  .gp-step.expanded { background: #f7faf8; border-color: #CC6600; }
  .gp-num {
    position: absolute; left: -28px; top: 14px;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; z-index: 1;
  }
  .gp-num.done { background: #CC6600; color: #fff; }
  .gp-num.active { background: #022e21; color: #fff; }
  .gp-num.pending { background: #e8e3d8; color: #8b7355; }
  .gp-step-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .gp-step-title { font-size: 14px; font-weight: 500; color: #022e21; }
  .gp-badge {
    font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0;
  }
  .gp-badge.done { background: #d4e8dc; color: #CC6600; }
  .gp-badge.active { background: #dce8fb; color: #1a4a8a; }
  .gp-badge.pending { background: #f4f1eb; color: #8b7355; }
  .gp-step-date { font-size: 11px; color: #8b7355; margin-top: 2px; }
  .gp-step-detail {
    display: none; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #e8e3d8;
  }
  .gp-step.expanded .gp-step-detail { display: block; }
  .gp-step-desc { font-size: 12px; color: #4a4a4a; line-height: 1.65; margin-bottom: 10px; }
  .gp-progress-wrap { margin-bottom: 8px; }
  .gp-progress-bar {
    height: 6px; background: #e8e3d8; border-radius: 3px; overflow: hidden;
  }
  .gp-progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .gp-progress-fill.done { background: #CC6600; }
  .gp-progress-fill.active { background: #1a4a8a; }
  .gp-progress-fill.pending { background: #c9c2b4; }
  .gp-meta { font-size: 11px; color: #8b7355; display: flex; gap: 14px; flex-wrap: wrap; }

  /* Chart */
  .gp-chart { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e8e3d8; }
  .gp-chart h3 { font-size: 13px; font-weight: 500; color: #022e21; margin-bottom: 12px; }
  .gp-chart svg { width: 100%; height: 220px; }
  .gp-chart-area { fill: url(#areaGrad); }
  .gp-chart-line { fill: none; stroke: #CC6600; stroke-width: 2.5; }
  .gp-chart-dot { fill: #CC6600; }
  .gp-chart-label { font-size: 10px; fill: #8b7355; font-family: 'DM Sans', sans-serif; }
  .gp-chart-val { font-size: 9px; fill: #022e21; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .gp-chart-zero { stroke: #ccc; stroke-width: 1; stroke-dasharray: 4 3; }
  .gp-chart-grid { stroke: #f0ede6; stroke-width: 1; }

  /* Gameplan button */
  .gp-open-btn {
    width: 100%; margin-top: 10px; padding: 9px; border-radius: 8px;
    border: 1px solid #CC6600; background: #f3f9f6; color: #CC6600;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .gp-open-btn:hover { background: #CC6600; color: #fff; }

  /* ── CHAT AREA ── */
  .chat-area { display: flex; flex-direction: column; background: #f4f1eb; min-height: 0; height: 100%; overflow: hidden; }
  .chat-header { background: #fff; border-bottom: 1px solid #e8e3d8; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
  .chat-header-info h3 { font-size: 14px; font-weight: 500; color: #022e21; }
  .chat-header-info p { font-size: 11px; color: #6b7280; }
  .status-badge { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: #CC6600; font-weight: 500; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #CC6600; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(204,102,0,0.4); } 50% { box-shadow: 0 0 0 5px rgba(204,102,0,0); } }
  @keyframes nudge { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-6px); } }
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 24px; }
  .empty-title { font-size: 16px; font-weight: 500; color: #022e21; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: #8b7355; line-height: 1.6; max-width: 280px; margin-bottom: 18px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .sugg-btn {
    background: #fff; border: 1px solid #e8e3d8; border-radius: 20px;
    padding: 7px 13px; font-size: 12px; color: #022e21; cursor: pointer; transition: all 0.15s;
  }
  .sugg-btn:hover { background: #f3f9f6; border-color: #CC6600; color: #CC6600; }
  .msg { display: flex; gap: 8px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }
  .bubble { padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.7; }
  .msg.ai .bubble { background: #fff; border: 1px solid #e8e3d8; color: #1a1a1a; border-bottom-left-radius: 3px; max-width: 100%; }
  .msg.user .bubble { background: #022e21; color: #fff; border-bottom-right-radius: 3px; white-space: pre-wrap; }
  .msg-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .ai-av { background: #e6f4ef; color: #CC6600; }
  .user-av { background: #e8e3d8; color: #555; }
  .typing { display: flex; gap: 4px; padding: 10px 14px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  @keyframes wave { 0%,100% { transform: rotate(0deg); } 15% { transform: rotate(14deg); } 30% { transform: rotate(-8deg); } 45% { transform: rotate(14deg); } 60% { transform: rotate(-4deg); } 75% { transform: rotate(10deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .profile-btn { animation: fadeIn 0.3s ease-out both; }
  .profile-btn:nth-child(1) { animation-delay: 0.05s; }
  .profile-btn:nth-child(2) { animation-delay: 0.1s; }
  .profile-btn:nth-child(3) { animation-delay: 0.15s; }
  .profile-btn:nth-child(4) { animation-delay: 0.2s; }
  .profile-btn:nth-child(5) { animation-delay: 0.25s; }
  .profile-btn:nth-child(6) { animation-delay: 0.3s; }
  .msg { animation: fadeIn 0.25s ease-out; }
  .sugg-btn { transition: all 0.2s; }
  .sugg-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(204,102,0,0.15); }
  .disclaimer { font-size: 10px; color: #aaa; text-align: center; padding: 5px 20px; background: #fff; border-top: 1px solid #e8e3d8; }
  .input-row { background: #fff; border-top: 1px solid #e8e3d8; padding: 12px 20px; display: flex; gap: 8px; align-items: flex-end; }
  .chat-input {
    flex: 1; border: 1px solid #e8e3d8; border-radius: 9px;
    padding: 9px 13px; font-size: 13px; resize: none; outline: none;
    color: #1a1a1a; background: #fafaf8; line-height: 1.5; max-height: 90px;
  }
  .chat-input:focus { border-color: #CC6600; background: #fff; }
  .send-btn {
    background: #022e21; color: #fff; border: none; border-radius: 9px;
    padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .no-profile { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #8b7355; gap: 8px; font-size: 13px; padding: 30px 20px; }
  .arc-hero { text-align: center; margin-bottom: 18px; }
  .arc-hero h1 { font-family: 'DM Serif Display', serif; font-size: 28px; color: #022e21; line-height: 1.2; margin: 0 0 6px; }
  .arc-hero p { font-size: 13px; color: #8b7355; margin: 0; max-width: 460px; }
  .arc-stage { perspective: 1400px; width: 100%; max-width: 720px; height: 320px; position: relative; display: flex; align-items: center; justify-content: center; margin: 8px 0; }
  .arc-card { position: absolute; width: 220px; height: 280px; background: #fff; border: 1px solid #e8e3d8; border-radius: 14px; padding: 18px 16px; box-shadow: 0 6px 20px rgba(2, 46, 33, 0.10); transition: transform 0.7s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.7s, box-shadow 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; transform-style: preserve-3d; }
  .arc-card.pos-current { transform: translateX(0) translateZ(80px) rotateY(0deg); z-index: 5; opacity: 1; box-shadow: 0 14px 36px rgba(2, 46, 33, 0.18); }
  .arc-card.pos-prev    { transform: translateX(-200px) translateZ(0) rotateY(35deg); z-index: 4; opacity: 0.85; }
  .arc-card.pos-next    { transform: translateX(200px)  translateZ(0) rotateY(-35deg); z-index: 4; opacity: 0.85; }
  .arc-card.pos-prev2   { transform: translateX(-330px) translateZ(-80px) rotateY(50deg); z-index: 3; opacity: 0.45; }
  .arc-card.pos-next2   { transform: translateX(330px)  translateZ(-80px) rotateY(-50deg); z-index: 3; opacity: 0.45; }
  .arc-card.pos-hidden  { transform: translateX(0) translateZ(-200px) scale(0.5); opacity: 0; pointer-events: none; }
  .arc-card-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid; }
  .arc-card-name { font-size: 15px; font-weight: 600; color: #022e21; margin-top: 6px; }
  .arc-card-nick { font-size: 11px; color: #022e21; font-style: italic; opacity: 0.7; }
  .arc-card-sub  { font-size: 11px; color: #4a4a4a; line-height: 1.45; padding: 0 4px; }
  .arc-card-cta  { font-size: 11px; color: #CC6600; font-weight: 600; margin-top: auto; padding-top: 10px; }
  .arc-card.pos-current:hover { transform: translateX(0) translateZ(90px) rotateY(0deg) scale(1.02); }
  .arc-nav { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 10px; }
  .arc-arrow { background: #fff; border: 1px solid #e8e3d8; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; color: #022e21; font-size: 16px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .arc-arrow:hover { border-color: #CC6600; color: #CC6600; }
  .arc-dots { display: flex; gap: 7px; }
  .arc-dot { width: 7px; height: 7px; border-radius: 50%; background: #c9c2b4; transition: all 0.3s; cursor: pointer; border: none; padding: 0; }
  .arc-dot.active { background: #CC6600; transform: scale(1.3); }
  .arc-foot { font-size: 11px; color: #8b7355; text-align: center; margin-top: 14px; max-width: 480px; line-height: 1.5; }
  @media (max-width: 768px) {
    .arc-hero h1 { font-size: 22px; }
    .arc-stage { height: 280px; }
    .arc-card { width: 180px; height: 240px; padding: 14px 12px; }
    .arc-card.pos-prev    { transform: translateX(-150px) translateZ(0) rotateY(40deg); }
    .arc-card.pos-next    { transform: translateX(150px)  translateZ(0) rotateY(-40deg); }
    .arc-card.pos-prev2,
    .arc-card.pos-next2   { opacity: 0; pointer-events: none; }
  }

  /* ── MOBILE TOGGLE ── */
  .mobile-toggle { display: none; }
  .back-btn { display: none; }

  /* ── MOBILE RESPONSIVE ── */
  @media (max-width: 768px) {
    .topbar { padding: 10px 16px; }
    .logo { font-size: 18px; }
    .logo .logo-tag { font-size: 10px; }
    .main { grid-template-columns: 1fr; height: calc(100vh - 47px); }
    .sidebar { position: absolute; inset: 0; top: 47px; z-index: 100; display: flex; }
    .sidebar.hidden { display: none; }
    .chat-area { position: absolute; inset: 0; top: 47px; z-index: 99; }
    .chat-area.hidden { display: none; }
    .mobile-toggle { display: flex; }
    .back-btn {
      display: flex; align-items: center; gap: 4px; background: none; border: none;
      color: #CC6600; font-size: 12px; font-weight: 500; cursor: pointer; padding: 0; margin-right: 6px;
    }
    .resize-handle { display: none; }
    .avatar.xl { width: 56px; height: 56px; font-size: 28px; }
    .chat-header { flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
    .chat-header-info h3 { font-size: 13px; }
    .input-row { padding: 8px 12px; }
    .messages { padding: 12px 14px; }
    .form-row { grid-template-columns: 1fr; }
  }

  /* ── ADD MEMBER MODAL ── */
  .add-btn {
    width: 100%; background: none; border: 1px dashed #c3d8cc; border-radius: 10px;
    padding: 10px 12px; cursor: pointer; text-align: center; color: #CC6600;
    font-size: 13px; font-weight: 500; transition: all 0.15s; margin-bottom: 5px;
  }
  .add-btn:hover { background: #f3f9f6; border-color: #CC6600; }
  .modal-overlay {

  const fields = [
    p.name, p.age, p.job,

    p.hh,
    p.inc,
    p.own !== null ? 'yes' : null,

    p.bio && !p.bio.includes("hasn't completed") ? 'yes' : null,
    p.suitability.riskTolerance !== 'Unknown' ? 'yes' : null,
    p.suitability.investmentExperience !== 'Unknown' ? 'yes' : null,
    p.suitability.investmentObjective !== 'Unknown' ? 'yes' : null,
    p.suitability.timeHorizon !== 'Unknown' ? 'yes' : null,
    p.suitability.liquidNetWorth !== null ? 'yes' : null,
    p.suitability.totalNetWorth !== null ? 'yes' : null,
    p.suitability.monthlyExpenses !== null ? 'yes' : null,
    p.suitability.emergencyFund !== 'Unknown' ? 'yes' : null,
    p.suitability.taxBracket !== 'Unknown' ? 'yes' : null,
    p.suitability.filingStatus !== 'Unknown' ? 'yes' : null,
    p.suitability.dependents !== 'Unknown' ? 'yes' : null,
    p.suitability.hasLifeInsurance !== 'Unknown' ? 'yes' : null,
    p.suitability.hasDisabilityInsurance !== 'Unknown' ? 'yes' : null,
    p.suitability.hasEstatePlan !== 'Unknown' ? 'yes' : null,
    p.suitability.employmentStability !== 'Unknown' ? 'yes' : null,
    hasGameplan(p) ? 'yes' : null,
  ];
  const filled = fields.filter(f => f !== null && f !== undefined).length;
  return Math.round((filled / fields.length) * 100);
}

/* Format AI responses: markdown → styled HTML + progress bars */
function formatResponse(text) {
  // Progress bars: [PROGRESS: 4800/19200 "Emergency Fund"]
  text = text.replace(/\[PROGRESS:\s*(\d+)\s*\/\s*(\d+)\s*"([^"]+)"\]/g, (_, cur, target, label) => {
    const c = parseInt(cur), t = parseInt(target);
    const pct = Math.min(100, Math.round((c / t) * 100));
    const barColor = pct >= 75 ? '#CC6600' : pct >= 40 ? '#f0c040' : '#e74c3c';
    return `<div style="margin:10px 0">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="font-weight:600;color:#022e21">${label}</span>
        <span style="color:#6b7280">$${c.toLocaleString()} / $${t.toLocaleString()} (${pct}%)</span>
      </div>
      <div style="height:10px;background:#e8e3d8;border-radius:5px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:5px;transition:width 0.4s"></div>
      </div>
    </div>`;
  });

  // Comparison bars: [COMPARE: 600 "Interest you're paying" vs 600 "Could be investing"]
  text = text.replace(/\[COMPARE:\s*(\d+)\s*"([^"]+)"\s*vs\s*(\d+)\s*"([^"]+)"\]/g, (_, v1, l1, v2, l2) => {
    const n1 = parseInt(v1), n2 = parseInt(v2);
    const max = Math.max(n1, n2);
    return `<div style="margin:10px 0;display:flex;gap:8px;align-items:center">
      <div style="flex:1">
        <div style="font-size:10px;color:#c0392b;margin-bottom:2px">${l1}</div>
        <div style="height:8px;background:#fde8e8;border-radius:4px;overflow:hidden"><div style="height:100%;width:${(n1/max)*100}%;background:#e74c3c;border-radius:4px"></div></div>
        <div style="font-size:11px;font-weight:600;color:#c0392b;margin-top:1px">$${n1.toLocaleString()}/yr</div>
      </div>
      <div style="font-size:10px;color:#8b7355">vs</div>
      <div style="flex:1">
        <div style="font-size:10px;color:#CC6600;margin-bottom:2px">${l2}</div>
        <div style="height:8px;background:#d4e8dc;border-radius:4px;overflow:hidden"><div style="height:100%;width:${(n2/max)*100}%;background:#CC6600;border-radius:4px"></div></div>
        <div style="font-size:11px;font-weight:600;color:#CC6600;margin-top:1px">$${n2.toLocaleString()}/yr</div>
      </div>
    </div>`;
  });

  // Strip # headers but keep text
  text = text.replace(/^#{1,3}\s+(.+)/gm, '$1');
  // em dashes → commas
  text = text.replace(/—/g, ', ');
  // Bold: **text** → <strong>
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#022e21">$1</strong>');
  // Italic: *text* → <em>
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Bullet points: - item → styled bullet
  text = text.replace(/^[-•]\s+(.+)/gm, '<div style="display:flex;gap:8px;align-items:flex-start;margin:3px 0"><span style="color:#CC6600;font-weight:bold;flex-shrink:0">•</span><span>$1</span></div>');
  // Code: `text` → styled span
  text = text.replace(/`([^`]+)`/g, '<span style="background:#f4f1eb;padding:1px 5px;border-radius:4px;font-size:12px">$1</span>');
  // Newlines → <br>
  text = text.replace(/\n\n/g, '<br><br>');
  text = text.replace(/\n/g, '<br>');

  return text;
}

      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid #e8e3d8">
        <h2 style="font-size:11px;font-weight:500;color:#6b7280;text-transform:uppercase;letter-spacing:0.8px">Member Profiles</h2>
        <button onclick="openAddMember()" style="background:#022e21;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:500;cursor:pointer">+ Add</button>
      </div>`;
    dropdownOpen = true;
    document.getElementById('profileDropdown').classList.add('open');
    return;
  }
  const p = current;
  const pct = getProfileCompleteness(p);
  const pctColor = pct === 100 ? '#CC6600' : pct >= 70 ? '#b58a1b' : '#c0392b';
  const pctBg = pct === 100 ? '#d4e8dc' : pct >= 70 ? '#fef5d4' : '#fde8e8';
  sw.innerHTML = `
    <div class="profile-switcher" onclick="toggleDropdown()">
      <div class="avatar" style="background:${p.bg};border-color:${p.fg};width:36px;height:36px;font-size:16px">${p.emoji}</div>
      <div style="flex:1;min-width:0">
        <span style="font-size:13px;font-weight:600;color:#022e21;display:block">${p.name} <span style="font-size:10px;font-weight:500;padding:2px 6px;border-radius:8px;background:${pctBg};color:${pctColor};margin-left:3px">${pct}%</span></span>
        <span style="font-size:10px;color:#022e21;font-style:italic">${p.nick}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${p.id > 6 ? `<button onclick="event.stopPropagation();openEditMember()" style="background:none;border:1px solid #e8e3d8;border-radius:5px;padding:2px 7px;font-size:9px;color:#6b7280;cursor:pointer">Edit</button>` : ''}
        <button onclick="event.stopPropagation();openAddMember()" style="background:#022e21;color:#fff;border:none;border-radius:5px;padding:2px 7px;font-size:9px;cursor:pointer">+ Add</button>
        <div class="switcher-arrow ${dropdownOpen ? 'open' : ''}" id="switcherArrow">▼</div>
      </div>
    </div>`;
  // Toggle dropdown visibility
  const dd = document.getElementById('profileDropdown');
  if (dropdownOpen) dd.classList.add('open');
  else dd.classList.remove('open');
}

function toggleDropdown() {
  dropdownOpen = !dropdownOpen;
  const dd = document.getElementById('profileDropdown');
  const arrow = document.getElementById('switcherArrow');
  if (dropdownOpen) {
    dd.classList.add('open');
    if (arrow) arrow.classList.add('open');
  } else {
    dd.classList.remove('open');
    if (arrow) arrow.classList.remove('open');
  }
}

function renderList() {
  document.getElementById('profileList').innerHTML = PROFILES.map(p => {
    const pct = getProfileCompleteness(p);
    const pctColor = pct === 100 ? '#CC6600' : pct >= 70 ? '#b58a1b' : '#c0392b';
    const pctBg = pct === 100 ? '#d4e8dc' : pct >= 70 ? '#fef5d4' : '#fde8e8';
    return `
    <button class="profile-btn ${current && current.id === p.id ? 'active' : ''}" onclick="pickProfile(${p.id})">
      <div class="avatar" style="background:${p.bg};border-color:${p.fg}">${p.emoji}</div>
      <div style="flex:1;min-width:0">
        <span class="profile-name">${p.name} <span style="font-size:10px;font-weight:500;padding:2px 6px;border-radius:8px;background:${pctBg};color:${pctColor};margin-left:4px">${pct}%</span></span>
        <span class="nickname">${p.nick}</span>
        <span class="profile-sub">${p.sub}</span>
      </div>
    </button>`;
  }).join('');
  renderSwitcher();
}

/* ─────────────────────────────────────────
   RENDER PROFILE DETAIL CARD
───────────────────────────────────────── */
function renderCard(p) {
  const s = p.suitability;
  const pct = getProfileCompleteness(p);
  const pctColor = pct === 100 ? '#CC6600' : pct >= 70 ? '#b58a1b' : '#c0392b';
  const pctBg = pct === 100 ? '#d4e8dc' : pct >= 70 ? '#fef5d4' : '#fde8e8';

  // Find missing fields for incomplete profiles
  const missing = [];

  if (s.riskTolerance === 'Unknown') missing.push('Risk Tolerance');
  if (s.investmentExperience === 'Unknown') missing.push('Investment Experience');
  if (s.investmentObjective === 'Unknown') missing.push('Investment Objective');
  if (s.timeHorizon === 'Unknown') missing.push('Time Horizon');
  if (s.liquidNetWorth === null) missing.push('Liquid Net Worth');
  if (s.totalNetWorth === null) missing.push('Total Net Worth');
  if (s.monthlyExpenses === null) missing.push('Monthly Expenses');
  if (s.emergencyFund === 'Unknown') missing.push('Emergency Fund');
  if (s.taxBracket === 'Unknown') missing.push('Tax Bracket');
  if (s.filingStatus === 'Unknown') missing.push('Filing Status');
  if (s.dependents === 'Unknown') missing.push('Dependents');
  if (s.hasLifeInsurance === 'Unknown') missing.push('Life Insurance');
  if (s.hasDisabilityInsurance === 'Unknown') missing.push('Disability Insurance');

        ${p.id > 6 ? `<button onclick="deleteProfile(${p.id})" style="background:none;border:1px solid #e8e3d8;border-radius:5px;padding:2px 7px;font-size:9px;color:#c0392b;cursor:pointer;flex-shrink:0">Delete</button>` : ''}

      <div class="suit-section">

          <div class="suit-item"><div class="suit-label">Objective</div><div class="suit-val ${s.investmentObjective === 'Unknown' ? 'flag' : ''}">${s.investmentObjective}</div></div>

          <div class="suit-item"><div class="suit-label">Dependents</div><div class="suit-val ${s.dependents === 'Unknown' ? 'flag' : ''}">${s.dependents}</div></div>

            <strong>No gameplan available</strong> — Complete the member's profile (need monthly expenses) to generate a personalized financial plan.
           </div>`}

/* ─────────────────────────────────────────
   SUGGESTED QUESTIONS
───────────────────────────────────────── */
function getSuggestions(p) {
  // Tailored questions based on each profile's actual situation
  const profileQuestions = {
    1: [ // Maria - nurse, student loans, wants home
      "How do I tackle $42K in student loans on a nurse's salary?",
      "When can I realistically buy my first home?",
      "Should I save or pay off debt first?",
      "Help me set up a paycheck automation system"
    ],
    2: [ // David & Jen - married, kids, college savings
      "Are we saving enough for Emma and Lucas's college?",
      "Should we max both 401(k)s or pay the mortgage faster?",
      "How do we balance college savings vs. retirement?",
      "Is our emergency fund big enough for a family of 4?"
    ],
    3: [ // Marcus - truck driver, divorce, late start
      "Is it too late to start saving for retirement at 52?",
      "What's the fastest way to kill $18K in credit card debt?",
      "How do I build wealth with a physical job that won't last forever?",
      "Help me build a plan from scratch"
    ],
    4: [ // Priya - business owner, high earner, aggressive
      "How do I optimize taxes between my LLC and personal income?",
      "Am I on track to retire by 55?",
      "Should I do a Mega Backdoor Roth?",
      "What's the best way to separate business and personal finances?"
    ],
    5: [ // Jordan - young, first-gen, retail
      "I'm new to investing. Where do I even start?",
      "Am I using my 401(k) match the right way?",
      "How do I build a budget that actually sticks?",
      "Help me set up my first paycheck routine"
    ],
    6: [ // Tasha - incomplete profile
      "What information do you need from me to get started?",
      "Can you give me general advice with what you know?",
      "What should my first financial priority be?",
      "Help me figure out where I stand financially"
    ]
  };

  // Use tailored questions if available, otherwise generate dynamic ones
  if (profileQuestions[p.id]) return profileQuestions[p.id];

  // Dynamic fallback for custom profiles
  const qs = [];
  if (Object.keys(p.debt).length > 0) qs.push("What's the best way to pay off my debt?");
  else qs.push("How should I start investing?");
  if (p.goals.length > 0) qs.push(`How do I achieve my goal: ${p.goals[0].name}?`);
  qs.push("Help me set up a paycheck automation system");
  qs.push("What should my top financial priority be right now?");
  return qs.slice(0, 4);
}

/* ─────────────────────────────────────────
   SELECT PROFILE
───────────────────────────────────────── */
function pickProfile(id) {
  if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }
  current = PROFILES.find(p => p.id === id);
  messages = loadChatHistory(id);
  loading = false;
  dropdownOpen = false;
  renderList();
  renderCard(current);
  renderChat();
  // Mobile: switch to chat view
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('chatArea').classList.remove('hidden');
  }
  // Auto-greeting for new conversations
  if (messages.length === 0) sendAutoGreeting();
}

function showSidebar() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chatArea').classList.add('hidden');
}

/* ─────────────────────────────────────────
   RENDER CHAT
───────────────────────────────────────── */
function renderChat() {
  const area = document.getElementById('chatArea');
  if (!current) {
    area.innerHTML = `<div class="no-profile">
      <div class="arc-hero">
        <h1>Built for the ones catching the entire family.</h1>
        <p>AI financial advice that gets the math <em>and</em> the family dynamics. Pick a member to see what a real plan looks like for someone in their situation.</p>
      </div>
      <div class="arc-stage" id="arcStage" onmouseenter="pauseArc()" onmouseleave="resumeArc()"></div>
      <div class="arc-nav">
        <button class="arc-arrow" onclick="arcAdvance(-1); resetArcInterval()" aria-label="Previous">&lsaquo;</button>
        <div class="arc-dots" id="arcDots"></div>
        <button class="arc-arrow" onclick="arcAdvance(1); resetArcInterval()" aria-label="Next">&rsaquo;</button>
      </div>
      <div class="arc-foot">Tap a card to chat with their AI advisor — or hit <strong>+ Add</strong> in the sidebar to load your own profile.</div>
    </div>`;
    startArc();
    return;
  }
  stopArc();
  const p = current;
  const suggs = getSuggestions(p);
  area.innerHTML = `
    <div class="chat-header">
      <button class="back-btn" onclick="showSidebar()">← Back</button>
      <div class="avatar" style="background:${p.bg};border-color:${p.fg}">${p.emoji}</div>
      <div class="chat-header-info">
        <h3>${p.name} <span style="font-size:11px;color:#022e21;font-weight:400;font-style:italic">· ${p.nick}</span></h3>
        <p>${p.job} · ${fmt(p.inc)}/yr · ${p.own ? 'Homeowner' : 'Renter'}</p>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        ${messages.length > 0 ? `
          <button onclick="exportChat()" style="background:none;border:1px solid #e8e3d8;border-radius:6px;padding:4px 10px;font-size:10px;color:#8b7355;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='#CC6600';this.style.color='#CC6600'" onmouseout="this.style.borderColor='#e8e3d8';this.style.color='#8b7355'">Export</button>
          <button onclick="clearChat()" style="background:none;border:1px solid #e8e3d8;border-radius:6px;padding:4px 10px;font-size:10px;color:#8b7355;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='#c0392b';this.style.color='#c0392b'" onmouseout="this.style.borderColor='#e8e3d8';this.style.color='#8b7355'">Clear</button>
        ` : ''}
        <div class="status-badge"><div class="status-dot"></div>AI Advisor Active${getProfileCompleteness(p) < 100 ? ` · <span style="color:#c0392b">${getProfileCompleteness(p)}% Profile</span>` : ''}</div>
      </div>
    </div>
    <div class="messages" id="messages">
      ${messages.length === 0
        ? `<div class="empty-state">
            <div class="avatar xl" style="background:${p.bg};border-color:${p.fg};margin-bottom:10px">${p.emoji}</div>
            <div class="empty-title">Chat with ${p.name.split(' ')[0]}'s AI Advisor</div>
            <div style="font-size:12px;color:#022e21;font-style:italic;margin-bottom:4px">${p.nick}</div>
            <div class="empty-sub">${getProfileCompleteness(p) < 100 ? 'This profile is incomplete — the advisor will let you know what info is needed.' : 'Full financial profile loaded. Ask anything for personalized guidance.'}</div>
            <div class="suggestions">${suggs.map(s => `<button class="sugg-btn" onclick="sendMessage('${s}')">${s}</button>`).join('')}</div>
           </div>`
        : messages.map(m => `
            <div class="msg ${m.role === 'user' ? 'user' : 'ai'}">
              ${m.role !== 'user' ? `<div class="msg-av ai-av">AI</div>` : ''}
              <div class="bubble">${m.role === 'assistant' ? formatResponse(m.content) : m.content}</div>
              ${m.role === 'user' ? `<div class="msg-av user-av">You</div>` : ''}
            </div>`).join('')}
      ${loading ? `<div class="msg ai"><div class="msg-av ai-av">AI</div><div class="bubble" style="background:#fff;border:1px solid #e8e3d8"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>` : ''}
      ${messages.length > 0 && !messages.some(m => m.role === 'user') ? `
        <div class="suggestions" style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:10px 0">
          ${suggs.map(s => `<button class="sugg-btn" onclick="sendMessage('${s}')">${s}</button>`).join('')}
        </div>` : ''}
    </div>
    <div class="disclaimer">For educational purposes only · Not professional financial advice</div>
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask about ${p.name.split(' ')[0]}'s finances..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" ${loading ? 'disabled' : ''}>Send ↑</button>
    </div>`;

  const msgs = document.getElementById('messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function clearChat() {
  if (!current) return;
  if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }
  messages = [];
  loading = false;
  saveChatHistory();
  renderChat();
}

/* ─────────────────────────────────────────
   SEND MESSAGE & CALL CLAUDE API
───────────────────────────────────────── */
async function sendMessage(text) {
  const input = document.getElementById('chatInput');
  const userText = text || (input && input.value.trim());

  if (!userText || loading) return;
  if (input) input.value = '';

  const p = current;
  messages.push({ role: 'user', content: userText });
  saveChatHistory();
  loading = true;
  renderChat();

  /* ── SYSTEM PROMPT — controls how Claude responds ── */
  const pct = getProfileCompleteness(p);
  const enabledList = enabledGoals(p);
  const goalsBlock = enabledList.length === 0 ? `

ENABLED GOALS: None on file. Plan = the canonical priority order only.` : `

ENABLED GOALS — what the member has currently turned ON (toggleable; OFF goals are intentionally excluded — don't mention them):
${enabledList.map(g => {
  const slot = g.slot === 'floor' ? 'FLOOR (survival commitment, slots in priority list before high-interest debt)' : 'PARALLEL (runs alongside other parallel goals after the floor)';
  const moneyTag = g.cadence === 'monthly'
    ? `$${g.amount.toLocaleString()}/mo ongoing`

When a member asks how to set up a paycheck routine, organize their money, or automate their finances, teach them this system:

Core Concept: Instead of "save what's left," flip it — savings, investments, and bills disappear FIRST (automatically), then you live on what remains.

Two Types of Money:
- INVISIBLE MONEY: Money you never see. It auto-transfers the day after payday to bills, savings, investments, and goal accounts. Gone before your brain can negotiate.
- VISIBLE MONEY: What's left after invisible money moves. This is guilt-free spending money. Spend it to zero if you want.

Step 1 — Set Up Separate Accounts (each account has ONE job):
1. Paycheck Account: Where direct deposit lands. Does nothing else. It's your "lookout tower" — you see exactly what came in (paycheck, bonus, raise) before anything moves.
2. Spending Account ("Spending Queen"): Your visible money. The ONLY account you spend from. Coffee, shopping, fun. When it hits zero, you're done until next payday.
3. High-Yield Savings Account (HYSA): Emergency fund. Use a DIFFERENT bank than checking (e.g., Vio Bank, Marcus, Ally). The friction of a separate login makes it harder to touch.

2. Survival needs: Groceries, gas, toiletries. Non-negotiable expenses.
3. Fun budget: Eating out, concerts, clothes. Pick a realistic number.

Step 3 — Automate the Flow (set it and forget it):
- Payday (Day 1): Paycheck hits Paycheck Account.
- Day 2: Auto-transfers move invisible money out — bills, emergency fund, investments, goal funds.
- Day 2: Whatever's left transfers to Spending Account.
- Day 3-30: Live on the Spending Account. That's it. No decisions to make.

/* ─────────────────────────────────────────
   GAMEPLAN MATH HELPERS
───────────────────────────────────────── */
const CURRENT_YEAR = 2026;            // matches the demo's "today"
const RAISE_RATE = 0.03;              // assumed annual raise
const RETURN_RATE_INVEST = 0.08;      // long-term investing default (8%)
const RETURN_RATE_CASH = 0.03;        // emergency fund + short-term cash savings (3%)
const RETURN_RATE_HOME = 0.03;        // nominal home appreciation (3%)

/* Effective take-home rate from a marginal tax bracket string like "22%". Rough but defensible. */
function estimateTakeHomeRate(taxBracket) {
  if (!taxBracket || taxBracket === 'Unknown') return 0.78;
  const m = String(taxBracket).match(/(\d+)/);
  if (!m) return 0.78;
  const marginal = parseInt(m[1], 10) / 100;
  // Effective fed income tax ~70% of marginal, plus 7.65% payroll, plus ~5% state estimate.
  const effective = marginal * 0.7 + 0.0765 + 0.05;
  return Math.max(0.55, 1 - effective);
}

/* Estimated monthly cash available after taxes, expenses, and active monthly survival goals. */
function estimateMonthlyAvailable(p) {
  if (!p.suitability || p.suitability.monthlyExpenses == null) return null;
  const takeHomeRate = estimateTakeHomeRate(p.suitability.taxBracket);
  const monthlyTakeHome = (p.inc * takeHomeRate) / 12;
  const monthlyExpenses = p.suitability.monthlyExpenses;
  const monthlyGoalCommit = enabledGoals(p)
    .filter(g => g.cadence === 'monthly')
    .reduce((s, g) => s + g.amount, 0);
  return monthlyTakeHome - monthlyExpenses - monthlyGoalCommit;
}

/* Monthly contribution needed to hit a goal by its target year.
   - debt: loan amortization formula (PMT = P·i / (1−(1+i)^−n)) using interestRate
   - cash/invest: solve PMT for FV target, accounting for currentSaved growth
   - monthly cadence: returns the monthly cost (it's already a monthly commitment)
*/
function computeMonthlyNeeded(goal, currentYear) {
  if (goal.cadence === 'monthly') return goal.amount;
  const yearsRemaining = (goal.targetYear || 0) - currentYear;
  if (yearsRemaining <= 0) return null;
  const months = Math.round(yearsRemaining * 12);

  if (goal.kind === 'debt') {
    const principal = (goal.amount || 0) - (goal.currentSaved || 0);
    if (principal <= 0) return 0;
    const i = (goal.interestRate || 0) / 12;
    if (i === 0) return principal / months;
    return (principal * i) / (1 - Math.pow(1 + i, -months));
  }

  const annualReturn = goal.kind === 'invest' ? RETURN_RATE_INVEST : RETURN_RATE_CASH;
  const m = Math.pow(1 + annualReturn, 1/12) - 1;
  const fvCurrent = (goal.currentSaved || 0) * Math.pow(1 + m, months);
  const gap = goal.amount - fvCurrent;
  if (gap <= 0) return 0;
  return (gap * m) / (Math.pow(1 + m, months) - 1);
}

/* True if we have enough data to build a meaningful gameplan. */
function hasGameplan(p) {
  return !!(p && p.inc && p.suitability && p.suitability.monthlyExpenses != null);
}

/* Standard amortization term per debt type (months). Used to compute baseline monthly
   payments for natural payoff. Matches typical real-world loan structures. */
function defaultTermMonths(debtName) {
  const lower = (debtName || '').toLowerCase();
  if (lower.includes('mortgage')) return 360;     // 30-year
  if (lower.includes('student'))  return 120;     // 10-year
  if (lower.includes('business')) return 84;      // 7-year SBA-style
  if (lower.includes('car'))      return 60;      // 5-year
  if (lower.includes('credit'))   return 60;      // 5-year generous baseline (real CC mins are lower; this gives natural payoff)
  return 60;
}

    g.slot !== 'floor' && g.kind !== 'debt' && g.cadence !== 'monthly'
  );
  const monthlyCommit = enabled.filter(g => g.cadence === 'monthly').reduce((s, g) => s + g.amount, 0);
  const takeHomeRate = estimateTakeHomeRate(p.suitability.taxBracket);

  function applyAnnualPayment(balance, rate, annualPayment) {
    const i = rate / 12;
    if (i === 0) return Math.max(0, balance - annualPayment);
    const pmt = annualPayment / 12;
    const residual = balance * Math.pow(1 + i, 12) - pmt * (Math.pow(1 + i, 12) - 1) / i;
    return Math.max(0, residual);
  }

  const projections = [];
  const startTotalDebt = debts.reduce((s, d) => s + d.balance, 0);
  projections.push({ year: startYear, netWorth: Math.round(cash + invest + homeValue - startTotalDebt) });

  for (let year = startYear + 1; year <= endYear; year++) {
    const yearsElapsed = year - startYear;
    const grossIncome = p.inc * Math.pow(1 + RAISE_RATE, yearsElapsed);
    const monthlyTakeHome = (grossIncome * takeHomeRate) / 12;
    // Effective expenses include only baselines for ACTIVE debts. Once a loan's balance
    // hits 0, its baseline drops out and that cash is freed.
    const activeBaselineMonthly = debts.filter(d => d.balance > 0).reduce((s, d) => s + d.baselinePmt, 0);
    const effectiveExpensesMonthly = nonDebtExpensesMonthly + activeBaselineMonthly;
    const monthlyPool = Math.max(0, monthlyTakeHome - effectiveExpensesMonthly - monthlyCommit);
    let annualPool = monthlyPool * 12;

    // Floor: emergency fund top-off (spread shortfall over ~2 yrs, min $2400/yr if any gap)
    const efGap = Math.max(0, efTarget - cash);
    if (efGap > 0 && annualPool > 0) {
      const efContribution = Math.min(annualPool, Math.max(efGap / 2, 2400));
      cash += efContribution;
      annualPool -= efContribution;
    }

    // Floor: high-interest debts. Baseline amortization is paid via the expense line.
    // Cash pool funds the EXTRA principal needed to hit the accelerated 24-mo target.
    debts.filter(d => d.isHID && d.balance > 0).forEach(d => {
      const targetPmt = amortPMT(d.balance, d.rate, 24);
      const extraMonthlyNeeded = Math.max(0, targetPmt - d.baselinePmt);
      const extraAnnualNeeded = extraMonthlyNeeded * 12;
      const actualExtraAnnual = Math.min(annualPool, extraAnnualNeeded);
      const totalAnnualPayment = (d.baselinePmt * 12) + actualExtraAnnual;
      d.balance = applyAnnualPayment(d.balance, d.rate, totalAnnualPayment);
      annualPool -= actualExtraAnnual;
    });

    // Non-attacked, non-HID debts: just apply the baseline payment from expenses.
    // Balance pays down naturally per the loan's standard amortization term.
    debts.filter(d => !d.isHID && !d.linkedGoal && d.balance > 0).forEach(d => {
      d.balance = applyAnnualPayment(d.balance, d.rate, d.baselinePmt * 12);
    });

    // Parallel: pro-rated allocation. For debt goals, the EXTRA above baseline competes
    // for cash pool dollars; baseline stays in expenses.
    const parallelNeeds = [];
    parallelNonDebtGoals.forEach(g => {
      const need = computeMonthlyNeeded(g, year);
      if (need && need > 0) parallelNeeds.push({ kind: g.kind, monthlyPoolDraw: need });
    });
    debts.filter(d => d.linkedGoal && !d.isHID && d.balance > 0).forEach(d => {
      const monthsLeft = Math.max(1, (d.linkedGoal.targetYear - year) * 12);
      const targetPmt = amortPMT(d.balance, d.rate, monthsLeft);
      const extraMonthly = Math.max(0, targetPmt - d.baselinePmt);
      parallelNeeds.push({ kind: 'debt', monthlyPoolDraw: extraMonthly, debt: d });
    });
    parallelNeeds.push({ kind: 'invest', monthlyPoolDraw: ROTH_ANNUAL / 12 }); // canonical Roth IRA

    const totalPoolDrawAnnual = parallelNeeds.reduce((s, n) => s + n.monthlyPoolDraw, 0) * 12;
    const proRate = totalPoolDrawAnnual > 0 ? Math.min(1, annualPool / totalPoolDrawAnnual) : 0;

    parallelNeeds.forEach(n => {
      const annual = n.monthlyPoolDraw * 12 * proRate;
      if (n.kind === 'invest') invest += annual;
      else if (n.kind === 'cash') cash += annual;
      else if (n.kind === 'debt') {
        // Total payment = baseline (from expenses) + extra (from pool, pro-rated)
        const totalAnnualPayment = (n.debt.baselinePmt * 12) + annual;
        n.debt.balance = applyAnnualPayment(n.debt.balance, n.debt.rate, totalAnnualPayment);
      }
    });
    annualPool -= totalPoolDrawAnnual * proRate;

    // Surplus → invest
    if (annualPool > 0) invest += annualPool;

    // Bucket growth
    cash *= 1 + RETURN_RATE_CASH;
    invest *= 1 + RETURN_RATE_INVEST;
    homeValue *= 1 + RETURN_RATE_HOME;

    const totalDebt = debts.reduce((s, d) => s + d.balance, 0);
    projections.push({ year, netWorth: Math.round(cash + invest + homeValue - totalDebt) });
  }

  return projections;
}

/* Build the gameplan dynamically from canonical priorities + active goals.
   Returns step objects shaped like the old hand-authored steps so the existing
   gp-step rendering keeps working: { step, title, desc, target, current, monthly, date, status }
   Plus a `zone` field used to insert a divider before the parallel block.
*/
function buildDynamicGameplan(p) {
  if (!hasGameplan(p)) return [];
  const steps = [];
  const enabled = enabledGoals(p);
  const floorGoals = enabled.filter(g => g.slot === 'floor');
  const parallelGoals = enabled.filter(g => g.slot !== 'floor');
  const monthlyExp = p.suitability.monthlyExpenses;
  let n = 1;

  // 1. Employer match (if access yes/unknown)
  if (p.matchAccess === 'yes') {
    steps.push({
      step: n++, zone: 'floor', status: 'active', title: 'Employer Match',
      desc: `Contribute at least enough to your employer plan to capture the FULL match. This is a guaranteed 100% return on every dollar — and the deadline is every paycheck. If you skip a paycheck's match, that money is gone forever. Choose the Roth option if available so withdrawals are tax-free in retirement. WHY THIS IS #1: nothing else in your plan offers an instant 100% return that expires this fast.`,
      target: 0, current: 0, monthly: 0, months: 0, date: 'Now — ongoing'
    });
  } else if (p.matchAccess !== 'no') {
    steps.push({
      step: n++, zone: 'floor', status: 'active', title: 'Verify Employer Match',
      desc: `Before anything else, call HR or check your benefits portal: do you have access to a 401(k), 403(b), or 401(a) with employer match? If yes, contribute enough to capture the FULL match — it's guaranteed free money with a paycheck-by-paycheck deadline. If your employer offers no match, mark this confirmed and Emergency Fund moves to #1. WHY THIS IS #1: until we know, we have to assume free money is on the table that you're missing.`,
      target: 0, current: 0, monthly: 0, months: 0, date: 'Verify this week'
    });
  }

  // 2. Emergency Fund
  const efTarget = monthlyExp * 6;
  const efMatch = (p.suitability.emergencyFund || '').match(/(\d+(\.\d+)?)/);
  const efMonths = efMatch ? parseFloat(efMatch[1]) : 0;
  const efCurrent = Math.round(monthlyExp * efMonths);
  const efDone = efCurrent >= efTarget;
  const efGap = Math.max(0, efTarget - efCurrent);
  const efMonthlyContrib = efDone ? 0 : Math.max(200, Math.round(efGap / 24 / 25) * 25);
  steps.push({
    step: n++, zone: 'floor', status: efDone ? 'done' : 'active',
    title: 'Emergency Fund (3–6 months expenses)',
    desc: `Build $${efTarget.toLocaleString()} (6 months of your $${monthlyExp.toLocaleString()}/mo expenses) in a high-yield savings account at a DIFFERENT bank than checking — the friction makes it harder to touch. You currently have ~$${efCurrent.toLocaleString()} (${p.suitability.emergencyFund}). ${efDone ? 'You\'re fully funded — keep this topped up as expenses grow.' : `Funnel ~$${efMonthlyContrib.toLocaleString()}/mo here until you hit the target (~24 months).`} WHY THIS IS BEFORE EVERYTHING ELSE: without it, any setback (job loss, medical bill, car repair) forces you back into high-interest debt or to cash in investments at the wrong time, undoing years of progress.`,
    target: efTarget, current: efCurrent, monthly: efMonthlyContrib, months: efDone ? 0 : 24, date: efDone ? '✅ Complete' : '~24 months'
  });

  // 3. Active floor goals
  floorGoals.forEach(g => {
    const moTag = g.cadence === 'monthly' ? `$${g.amount.toLocaleString()}/mo` : `$${g.amount.toLocaleString()}`;
    steps.push({
      step: n++, zone: 'floor', status: 'active',
      title: `${g.name} (${moTag})`,
      desc: `${g.desc ? g.desc + '. ' : ''}This is a survival commitment you've turned ON — treated as a real recurring obligation, not discretionary. ${g.cadence === 'monthly' ? `It consumes $${g.amount}/mo of your cash flow before any debt payoff or investing.` : ''} WHY THIS IS IN THE FLOOR: it's tied to family survival, not lifestyle. We fund it before discretionary debt and investing because skipping it isn't on the table. The trade-off is real — that's $${g.amount}${g.cadence === 'monthly' ? '/mo' : ''} that can't go to other goals — but it's your call to make and we honor it.`,
      target: 0, current: 0, monthly: g.cadence === 'monthly' ? g.amount : 0, months: 0, date: g.cadence === 'monthly' ? 'Ongoing' : (g.targetYear ? `By ${g.targetYear}` : 'TBD')
    });
  });

  // 4. High-interest debts (>= 9%)
  if (p.debt && p.debtRates) {
    Object.entries(p.debt).forEach(([name, amount]) => {
      const rate = p.debtRates[name];
      if (rate != null && rate >= 0.09) {
        const annualInterest = Math.round(amount * rate);
        const targetMonths = 24;
        const i = rate / 12;
        const pmt = Math.round((amount * i) / (1 - Math.pow(1 + i, -targetMonths)));
        steps.push({
          step: n++, zone: 'floor', status: 'active',
          title: `Pay Off ${name} ($${amount.toLocaleString()} @ ${(rate*100).toFixed(0)}%)`,
          desc: `Your ${name.toLowerCase()} balance of $${amount.toLocaleString()} at ${(rate*100).toFixed(0)}% APR is bleeding ~$${annualInterest.toLocaleString()}/yr in interest alone. That's WAY more than the market returns over the long run, which means every dollar of interest is a dollar stolen from your future wealth. Use the avalanche method — minimum payments on everything else, max payments here. At ~$${pmt.toLocaleString()}/mo you're done in ~24 months. Consider a 0% intro APR balance transfer card to buy yourself a runway. WHY THIS BEATS INVESTING: a guaranteed ${(rate*100).toFixed(0)}% return (the interest you stop paying) beats any reasonable investment return after-tax.`,
          target: amount, current: 0, monthly: pmt, months: targetMonths, date: '~24 months'
        });
      }
    });
  }

  // Parallel divider
  steps.push({ step: null, zone: 'parallel-divider', title: 'Then run these in parallel', desc: '' });

  // 5. Active parallel goals
  parallelGoals.forEach(g => {
    const monthlyNeed = computeMonthlyNeeded(g, CURRENT_YEAR);
    const yearsLeft = g.targetYear ? g.targetYear - CURRENT_YEAR : null;
    let why;
    if (g.kind === 'debt') {
      const annualInterest = Math.round((g.amount - (g.currentSaved || 0)) * (g.interestRate || 0));
      why = `Pay off $${g.amount.toLocaleString()} at ${((g.interestRate || 0)*100).toFixed(0)}% APR by ${g.targetYear}. Loan amortization works out to ~$${Math.round(monthlyNeed).toLocaleString()}/mo over ${yearsLeft} years. ${g.desc ? g.desc + '. ' : ''}WHY IT'S PARALLEL (NOT FLOOR): below the 9% high-interest threshold, so it doesn't have to be paid off before investing. But it still costs ~$${annualInterest.toLocaleString()}/yr in interest, so we don't ignore it either — it shares cash with your other goals.`;
    } else if (g.kind === 'invest') {
      why = `Reach $${g.amount.toLocaleString()} by ${g.targetYear} (${yearsLeft} years out). Assuming 7% annual return on long-term investments${g.currentSaved ? ' and $' + g.currentSaved.toLocaleString() + ' already saved' : ''}, you need ~$${Math.round(monthlyNeed).toLocaleString()}/mo. ${g.desc ? g.desc + '. ' : ''}WHY IT'S PARALLEL: long horizon means time-in-market does the heavy lifting; consistent contributions matter more than front-loading. Slot it alongside other parallel goals and let compound growth work.`;
    } else if (g.kind === 'cash') {
      why = `Save $${g.amount.toLocaleString()} by ${g.targetYear} (${yearsLeft} years out) in a HYSA at ~4%${g.currentSaved ? ', with $' + g.currentSaved.toLocaleString() + ' already saved' : ''}. You need ~$${Math.round(monthlyNeed).toLocaleString()}/mo. ${g.desc ? g.desc + '. ' : ''}WHY IT'S PARALLEL: shorter horizon and risk-averse use case (you'll need the cash by a specific date), so HYSA is the right vehicle. Sized to the deadline so it doesn't crowd out longer-term investing.`;
    } else {
      why = `Goal: $${g.amount.toLocaleString()} by ${g.targetYear || 'unspecified'}. ${g.desc || ''}`;
    }
    steps.push({
      step: n++, zone: 'parallel', status: 'pending', title: g.name,
      desc: why, target: g.amount, current: g.currentSaved || 0,
      monthly: Math.round(monthlyNeed || 0), months: yearsLeft ? yearsLeft * 12 : 0,
      date: g.targetYear ? `By ${g.targetYear}` : 'TBD'
    });
  });

  // 6. Canonical parallel items
  steps.push({
    step: n++, zone: 'parallel', status: 'pending', title: 'HSA (if eligible)',
    desc: `If your employer offers a high-deductible health plan (HDHP) you can pair with an HSA, open one. The HSA is the only account with a TRIPLE tax advantage: contributions are tax-deductible, growth is tax-free, and withdrawals for medical expenses are tax-free. After 65 it works like a bonus IRA (taxed only on non-medical withdrawals). Family limit is $8,550/yr (2025), individual $4,300/yr. Pay medical bills out of pocket and let the HSA invest and compound. WHY IT'S PARALLEL: annual contribution cap is use-it-or-lose-it (skipping a year, that year's room is gone forever), and the math is the most efficient in the tax code. Slot it in alongside other deadline-sensitive items — don't wait for "leftover" cash.`,
    target: 8550, current: 0, monthly: 0, months: 0, date: 'Annually'
  });
  steps.push({
    step: n++, zone: 'parallel', status: 'pending', title: 'Roth IRA',
    desc: `Contribute up to $7,000/yr ($8,000 if 50+) to a Roth IRA. After-tax money goes in, grows tax-free for decades, and comes out tax-free in retirement. The trade-off vs. traditional: you pay tax now instead of later. WHY ROTH MAKES SENSE FOR MOST: tax rates are historically low and likely to rise; locking in today's rate is a hedge. If your income exceeds the Roth direct-contribution limit (~$165K single, ~$246K MFJ), use the backdoor Roth method. WHY IT'S PARALLEL (not Surplus): the $7K annual cap is use-it-or-lose-it. Skip a year, that year's tax-free room is gone forever. Treat it as deadline-driven, not "if there's money left."`,
    target: 7000, current: 0, monthly: 0, months: 0, date: 'Annually'
  });
  if (p.suitability.dependents && p.suitability.dependents !== 'None' && p.suitability.dependents !== 'Unknown') {
    steps.push({
      step: n++, zone: 'parallel', status: 'pending', title: '529 Plan (kids\' education)',
      desc: `If you have kids, fund a 529 for each — tax-free growth for qualified education expenses. Many states offer a state income-tax deduction on contributions. WHY IT'S PARALLEL: kids age into college on a fixed timeline you can't slow down. Each year you skip is one less year of compounding before the bill arrives. CAVEAT: you can borrow for college, you can't borrow for retirement — so don't let 529 contributions starve the higher-leverage parallel items above. ${p.suitability.dependents} on file.`,
      target: 0, current: 0, monthly: 0, months: 0, date: 'Ongoing'
    });
  }

  // Surplus divider
  steps.push({ step: null, zone: 'surplus-divider', title: 'If goals are met and cash is still left over', desc: '' });

  // Surplus items — only relevant after the parallel block is funded
  steps.push({
    step: n++, zone: 'surplus', status: 'pending', title: 'Max 401(k) toward $23,500 cap',
    desc: `Beyond the match, push your total 401(k) contribution toward the $23,500/yr cap (2025). Bumping by 1% each raise is nearly painless and compounds enormously over a career. WHY IT'S SURPLUS (NOT PARALLEL): the urgent piece — the match — is already captured up in the floor. Adding above-match contributions has no paycheck-by-paycheck deadline; it competes for the same dollars as your near-term goals. If you're hitting your parallel goals on time and still have cash, this is where it goes. If you're NOT hitting your parallel goals, putting more here starves them and that's the wrong trade.`,
    target: 23500, current: 0, monthly: 0, months: 0, date: 'After goals are funded'
  });
  steps.push({
    step: n++, zone: 'surplus', status: 'pending', title: 'Taxable Brokerage',
    desc: `A regular brokerage account holding low-cost index funds (total US market, total international, maybe some bonds depending on age). No contribution limits, no age restrictions on withdrawal — this is your bridge for goals that don't fit the 59½ retirement-account window (early retirement, sabbaticals, big purchases beyond what your parallel goals already cover). Use tax-efficient ETFs and harvest losses where possible. WHY IT'S SURPLUS: no tax advantage, no annual cap, no deadline. It's the catch-all for excess cash once everything time-sensitive is funded. Funding this while parallel goals are short means you're picking the wrong order.`,
    target: 0, current: 0, monthly: 0, months: 0, date: 'After goals are funded'
  });

  return steps;
}

/* Render the feasibility panel: per-goal monthly need vs estimated available cash.
   Uses enabled non-survival goals (survival monthly goals are already deducted in estimateMonthlyAvailable). */
function renderFeasibilityPanel(p) {
  const enabled = enabledGoals(p);
  const targetGoals = enabled.filter(g => g.cadence !== 'monthly');
  if (targetGoals.length === 0) return '';
  const monthlyAvailable = estimateMonthlyAvailable(p);
  if (monthlyAvailable == null) return '';

  const rows = targetGoals.map(g => {
    const need = computeMonthlyNeeded(g, CURRENT_YEAR);
    return { goal: g, need: need == null ? 0 : need };
  });
  const totalNeed = rows.reduce((s, r) => s + r.need, 0);
  const surplus = monthlyAvailable - totalNeed;
  const onTrack = surplus >= 0;

  const fmtMo = (n) => '$' + Math.round(n).toLocaleString();
  const takeHomeRate = estimateTakeHomeRate(p.suitability.taxBracket);
  const grossMoreYearly = onTrack ? 0 : Math.round((-surplus * 12) / takeHomeRate / 500) * 500;
  const cutPerMo = onTrack ? 0 : Math.round(-surplus / 25) * 25;

  const monthlyCommits = enabled.filter(g => g.cadence === 'monthly');
  const monthlyCommitsHtml = monthlyCommits.length === 0 ? '' : `
    <div style="font-size:10px;color:#8b7355;margin-bottom:8px;font-style:italic">
      Already deducted from available: ${monthlyCommits.map(g => g.name + ' ($' + g.amount + '/mo)').join(', ')}
    </div>`;

  const rowsHtml = rows.map(r => {
    const g = r.goal;
    const rateTag = g.kind === 'debt' && g.interestRate ? ` @ ${(g.interestRate*100).toFixed(0)}%` : '';
    const subTag = g.targetYear ? `by ${g.targetYear} · ${fmt(g.amount)}${rateTag}` : `${fmt(g.amount)}${rateTag}`;
    return `
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:7px 10px;background:#faf8f4;border-radius:6px;margin-bottom:4px;font-size:11px">
        <div style="color:#022e21;font-weight:500">${g.name}</div>
        <div style="color:#8b7355">${subTag}</div>
        <div style="font-weight:600;color:${onTrack ? '#0a6e4a' : '#9a3412'}">${r.need === 0 ? '✓ on track' : 'needs ' + fmtMo(r.need) + '/mo'}</div>
      </div>`;
  }).join('');

  const verdictHtml = onTrack
    ? `<div style="background:#f3f9f6;border:1px solid #a8d4c2;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11px;color:#022e21">
         <strong>✓ All goals fit your timeline.</strong> ~${fmtMo(surplus)}/mo left over after parallel goals are funded — that's the cash that flows into the Surplus zone (max 401(k) toward the cap, taxable brokerage, or accelerate a goal).
       </div>`
    : `<div style="background:#fff7ed;border:1px solid #fcd9a8;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11px;color:#7c2d12;line-height:1.6">
         <strong>⚠ Shortfall: ${fmtMo(-surplus)}/mo</strong> on your current goals + timelines. Three levers to close it:
         <div style="margin-top:6px">
           • Earn <strong>~$${grossMoreYearly.toLocaleString()}/yr more</strong> (raise, side income, switch jobs)<br>
           • Push out one or more goals (later target year cuts the monthly need)<br>
           • Cut <strong>~$${cutPerMo.toLocaleString()}/mo</strong> from spending
         </div>
         <div style="margin-top:8px;font-style:italic;color:#8b7355">Usually it's a mix. Ask the AI advisor what the realistic path looks like for ${p.name.split(' ')[0]}.</div>
       </div>`;

  return `
    <div style="background:#fff;border:1px solid #e8e3d8;border-radius:10px;padding:14px 16px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:14px">🎯</span>
        <strong style="color:#022e21;font-size:13px">Goal Feasibility</strong>
        <span style="color:#8b7355;font-size:11px">· ${rows.length} target goal${rows.length === 1 ? '' : 's'} active</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;font-size:11px">
        <div style="background:#f8f6f0;border-radius:6px;padding:8px 10px">
          <div style="color:#8b7355;font-size:10px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:2px">Available / mo</div>
          <div style="color:#022e21;font-weight:600;font-size:13px">${fmtMo(monthlyAvailable)}</div>
        </div>
        <div style="background:#f8f6f0;border-radius:6px;padding:8px 10px">
          <div style="color:#8b7355;font-size:10px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:2px">Total goal need / mo</div>
          <div style="color:${onTrack ? '#0a6e4a' : '#9a3412'};font-weight:600;font-size:13px">${fmtMo(totalNeed)}</div>
        </div>
      </div>
      ${monthlyCommitsHtml}
      ${rowsHtml}
      ${verdictHtml}
      <div style="font-size:10px;color:#8b7355;margin-top:8px;font-style:italic">Assumes 3% annual raise · 8% return on investing, 3% on emergency fund + cash savings · debt uses loan amortization at the rate shown · take-home rate estimated from tax bracket. Rough math, not a quote.</div>
    </div>`;
}

/* ─────────────────────────────────────────
   GAMEPLAN MODAL
───────────────────────────────────────── */
function openGameplan() {
  if (!current) return;
  const p = current;
  document.getElementById('gpTitle').innerHTML = `Financial Gameplan: <span>${p.name}</span>`;

  const dynamicSteps = buildDynamicGameplan(p);
  const stepsHtml = dynamicSteps.map(s => {
    if (s.zone === 'parallel-divider') {
      return `
        <div style="display:flex;align-items:center;gap:10px;margin:18px 0 10px;padding:8px 12px;background:#f3f9f6;border:1px dashed #a8d4c2;border-radius:8px">
          <span style="font-size:14px">⇄</span>
          <strong style="color:#022e21;font-size:12px;text-transform:uppercase;letter-spacing:0.5px">${s.title}</strong>
          <span style="color:#8b7355;font-size:11px;font-style:italic">— split remaining monthly cash across all of these (sized to each deadline)</span>
        </div>`;
    }
    if (s.zone === 'surplus-divider') {
      return `
        <div style="display:flex;align-items:center;gap:10px;margin:18px 0 10px;padding:8px 12px;background:#fff7ed;border:1px dashed #fcd9a8;border-radius:8px">
          <span style="font-size:14px">💰</span>
          <strong style="color:#7c2d12;font-size:12px;text-transform:uppercase;letter-spacing:0.5px">${s.title}</strong>
          <span style="color:#8b7355;font-size:11px;font-style:italic">— only fund these once the parallel block is on track</span>
        </div>`;
    }
    const pct = s.target > 0 ? Math.min(100, Math.round((s.current / s.target) * 100)) : (s.status === 'done' ? 100 : 0);
    const zoneTag = s.zone === 'parallel'
      ? '<span style="font-size:9px;color:#0a6e4a;background:#d4e8dc;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.4px;margin-left:8px">parallel</span>'
      : s.zone === 'surplus'
      ? '<span style="font-size:9px;color:#7c2d12;background:#fff7ed;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.4px;margin-left:8px">surplus</span>'
      : '';
    return `
    <div class="gp-step" onclick="this.classList.toggle('expanded')">
      <div class="gp-num ${s.status}">${s.status === 'done' ? '✓' : s.step}</div>

function renderProjectionChart(projections) {
  const pad = { top: 30, right: 20, bottom: 35, left: 55 };
  const w = 660, h = 220;
  const iw = w - pad.left - pad.right;
  const ih = h - pad.top - pad.bottom;

  const vals = projections.map(p => p.netWorth);
  const minV = Math.min(0, ...vals);
  const maxV = Math.max(...vals);
  const range = maxV - minV || 1;

  const xStep = iw / (projections.length - 1);
  const toX = i => pad.left + i * xStep;
  const toY = v => pad.top + ih - ((v - minV) / range) * ih;

  const points = projections.map((p, i) => `${toX(i)},${toY(p.netWorth)}`);
  const linePath = 'M' + points.join(' L');
  const areaPath = linePath + ` L${toX(projections.length - 1)},${toY(minV)} L${toX(0)},${toY(minV)} Z`;

  const zeroY = toY(0);
  const showZero = minV < 0;

  const gridLines = [];
  const gridCount = 4;
  for (let i = 0; i <= gridCount; i++) {
    const v = minV + (range * i / gridCount);
    const y = toY(v);
    gridLines.push(`<line x1="${pad.left}" y1="${y}" x2="${w - pad.right}" y2="${y}" class="gp-chart-grid"/>`);
    const label = v >= 1000 || v <= -1000 ? (v / 1000).toFixed(0) + 'K' : v.toFixed(0);
    gridLines.push(`<text x="${pad.left - 8}" y="${y + 3}" text-anchor="end" class="gp-chart-label">$${label}</text>`);
  }

  const labels = projections.map((p, i) =>
    `<text x="${toX(i)}" y="${h - 8}" text-anchor="middle" class="gp-chart-label">${p.year}</text>`
  ).join('');

  const dots = projections.map((p, i) => {
    const valStr = p.netWorth >= 1000000 ? '$' + (p.netWorth / 1000000).toFixed(1) + 'M'
      : p.netWorth >= 1000 || p.netWorth <= -1000 ? '$' + (p.netWorth / 1000).toFixed(0) + 'K'
      : '$' + p.netWorth;
    return `<circle cx="${toX(i)}" cy="${toY(p.netWorth)}" r="3.5" class="gp-chart-dot"/>
      <text x="${toX(i)}" y="${toY(p.netWorth) - 8}" text-anchor="middle" class="gp-chart-val">${valStr}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC6600" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#CC6600" stop-opacity="0.02"/>
    </linearGradient></defs>
    ${gridLines.join('')}
    ${showZero ? `<line x1="${pad.left}" y1="${zeroY}" x2="${w - pad.right}" y2="${zeroY}" class="gp-chart-zero"/>` : ''}
    <path d="${areaPath}" class="gp-chart-area"/>
    <path d="${linePath}" class="gp-chart-line"/>
    ${dots}
    ${labels}
  </svg>`;
}

/* ── GOAL TOGGLE STATE ── */
function getGoalOverrides() {
  return JSON.parse(localStorage.getItem('wealthbox_goal_state') || '{}');
}

function getEffectiveEnabled(profile, goal) {
  const overrides = getGoalOverrides();
  if (overrides[profile.id] && goal.id in overrides[profile.id]) {
    return overrides[profile.id][goal.id];
  }
  return !!goal.enabled;
}

function toggleGoal(profileId, goalId) {
  const profile = PROFILES.find(p => p.id === profileId);
  if (!profile || !profile.goals) return;
  const g = profile.goals.find(x => x.id === goalId);
  if (!g) return;
  const overrides = getGoalOverrides();
  if (!overrides[profileId]) overrides[profileId] = {};
  overrides[profileId][goalId] = !getEffectiveEnabled(profile, g);
  localStorage.setItem('wealthbox_goal_state', JSON.stringify(overrides));
  renderCard(profile);
}

function enabledGoals(profile) {
  if (!profile.goals) return [];
  return profile.goals.filter(g => getEffectiveEnabled(profile, g));
}

function formatGoalCost(g) {
  const horizon = g.cadence === 'monthly'
    ? 'ongoing'
    : (g.targetYear ? 'by ' + g.targetYear : '—');
  if (g.cadence === 'monthly') return '$' + g.amount.toLocaleString() + '/mo · ' + horizon;
  return '$' + g.amount.toLocaleString() + ' · ' + horizon;
}

/* ─────────────────────────────────────────
   ROTATING PROFILE ARC (empty state)
───────────────────────────────────────── */
let arcIndex = 0;
let arcInterval = null;
let arcPaused = false;

function arcProfiles() {
  // Skip Tasha (incomplete profile — not signal for "first-gen catching the family")
  return PROFILES.filter(p => p.id !== 6).filter(p => p.id <= 5 || p.bio);
}

function renderArc() {
  const stage = document.getElementById('arcStage');
  if (!stage) return;
  const list = arcProfiles();
  const n = list.length;
  if (n === 0) { stage.innerHTML = ''; return; }
  stage.innerHTML = list.map((p, i) => {
    let offset = (i - arcIndex) % n;
    if (offset > n / 2) offset -= n;
    if (offset < -n / 2) offset += n;
    let posClass;
    if (offset === 0) posClass = 'pos-current';
    else if (offset === 1) posClass = 'pos-next';
    else if (offset === -1) posClass = 'pos-prev';
    else if (offset === 2) posClass = 'pos-next2';
    else if (offset === -2) posClass = 'pos-prev2';
    else posClass = 'pos-hidden';
    return `
      <div class="arc-card ${posClass}" onclick="selectArcProfile(${p.id})">
        <div class="arc-card-avatar" style="background:${p.bg};border-color:${p.fg};color:${p.fg}">${p.emoji}</div>
        <div class="arc-card-name">${p.name}</div>
        <div class="arc-card-nick">${p.nick}</div>
        <div class="arc-card-sub">${p.sub}</div>
        <div class="arc-card-cta">Tap to chat &rarr;</div>
      </div>`;
  }).join('');
  const dots = document.getElementById('arcDots');
  if (dots) {
    dots.innerHTML = list.map((p, i) =>
      `<button class="arc-dot ${i === arcIndex ? 'active' : ''}" onclick="setArcIndex(${i}); resetArcInterval()" aria-label="${p.name}"></button>`
    ).join('');
  }
}

function arcAdvance(delta) {
  const n = arcProfiles().length;
  if (n === 0) return;
  arcIndex = (arcIndex + delta + n) % n;
  renderArc();
}

function setArcIndex(i) {
  arcIndex = i;
  renderArc();
}

function selectArcProfile(id) {
  pickProfile(id);
}

function resetArcInterval() {
  if (arcInterval) clearInterval(arcInterval);
  arcInterval = setInterval(() => { if (!arcPaused) arcAdvance(1); }, 4500);
}

function pauseArc()  { arcPaused = true; }
function resumeArc() { arcPaused = false; }

function startArc() {
  renderArc();
  resetArcInterval();
}

function stopArc() {
  if (arcInterval) { clearInterval(arcInterval); arcInterval = null; }
  arcPaused = false;
}

function updateMemberCount() {
  const countEl = document.getElementById('memberCount');
  if (countEl) countEl.textContent = PROFILES.length + ' Members Loaded';
}

function sendAutoGreeting() {
  if (!current || messages.length > 0) return;
  const p = current;
  const pct = getProfileCompleteness(p);
  let greeting;

  const topGoalName = (p.goals && p.goals[0] && p.goals[0].name) ? p.goals[0].name.toLowerCase() : null;
  if (pct < 50) {
    greeting = `Hey ${p.name.split(' ')[0]}! 👋 Welcome to Wealth Box. I can see we're just getting started with your profile, so I've got some of your basics but I'll need a bit more info to give you the best advice. Ask me anything and I'll let you know what I need along the way.`;
  } else if (pct < 100) {
    greeting = topGoalName
      ? `Hey ${p.name.split(' ')[0]}! 👋 I've got most of your financial picture loaded up. I can see you're working as a ${p.job} making ${fmt(p.inc)}/yr, and your top goal is to ${topGoalName}. I'm missing a few details, but we can definitely get started. What's on your mind?`
      : `Hey ${p.name.split(' ')[0]}! 👋 I've got most of your financial picture loaded up. I can see you're working as a ${p.job} making ${fmt(p.inc)}/yr. I'm missing a few details, but we can definitely get started. What's on your mind?`;
  } else {
    const debtAmt = debtTotal(p);
    const goalPart = topGoalName ? ` and your big goal is to ${topGoalName}` : '';
    greeting = debtAmt > 0
      ? `Hey ${p.name.split(' ')[0]}! 👋 I've got your full financial profile loaded. I can see you're carrying ${fmt(debtAmt)} in debt${goalPart}. I've got some thoughts on how to get you there. What do you want to tackle first?`
      : `Hey ${p.name.split(' ')[0]}! 👋 I've got your full financial profile loaded. You're in solid shape${topGoalName ? ' and your focus is on ' + topGoalName : ''}. Let's make a plan. What's on your mind?`;
  }

  // Show typing dots first, then type in the greeting
  messages.push({ role: 'assistant', content: '' });
  loading = true;
  renderChat();

  setTimeout(() => {
    loading = false;
    renderChat();
    let charIndex = 0;
    const msgContainer = document.getElementById('messages');
    const bubbles = msgContainer.querySelectorAll('.msg.ai .bubble');
    const targetBubble = bubbles[bubbles.length - 1];
    let rawSoFar = '';

    typingInterval = setInterval(() => {
      if (charIndex < greeting.length) {
        const chunkSize = Math.floor(Math.random() * 4) + 2;
        rawSoFar += greeting.slice(charIndex, charIndex + chunkSize);
        charIndex += chunkSize;
        messages[messages.length - 1].content = rawSoFar;
        if (targetBubble) targetBubble.innerHTML = formatResponse(rawSoFar);
        if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
      } else {
        clearInterval(typingInterval);
        typingInterval = null;
        messages[messages.length - 1].content = greeting;
        renderChat();
      }
    }, 12);
  }, 800);
}

/* ─────────────────────────────────────────
   EXPORT CONVERSATION
───────────────────────────────────────── */
function exportChat() {
  if (!current || messages.length === 0) return;
  const p = current;
  const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  let text = `WEALTH BOX - Financial Conversation Export\n`;
  text += `Member: ${p.name} | ${p.job} | ${fmt(p.inc)}/yr\n`;
  text += `Date: ${date}\n`;
  text += `${'─'.repeat(50)}\n\n`;

  messages.forEach(m => {
    const label = m.role === 'user' ? 'YOU' : 'AI ADVISOR';
    // Strip markdown for plain text export
    const clean = m.content
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/\[PROGRESS:[^\]]+\]/g, '')
      .replace(/\[COMPARE:[^\]]+\]/g, '');
    text += `${label}:\n${clean}\n\n`;
  });

  text += `${'─'.repeat(50)}\n`;
  text += `For educational purposes only. Not professional financial advice.\n`;
  text += `Generated by Wealth Box AI Financial Advisor Demo`;

  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wealthbox-${p.name.replace(/\s+/g, '-').toLowerCase()}-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ─────────────────────────────────────────
   RESIZE HANDLE (drag to resize sidebar)
───────────────────────────────────────── */
(function() {
  const handle = document.getElementById('resizeHandle');
  const main = document.querySelector('.main');
  let dragging = false;

  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const newWidth = Math.min(600, Math.max(260, e.clientX));
    main.style.setProperty('--sidebar-width', newWidth + 'px');
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      handle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // Touch support for mobile
  handle.addEventListener('touchstart', (e) => {
    dragging = true;
    handle.classList.add('active');
  });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const touch = e.touches[0];
    const newWidth = Math.min(600, Math.max(260, touch.clientX));
    main.style.setProperty('--sidebar-width', newWidth + 'px');
  });

  document.addEventListener('touchend', () => {
    if (dragging) {
      dragging = false;
      handle.classList.remove('active');
    }
  });
})();
