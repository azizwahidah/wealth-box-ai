<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Box – AI Financial Advisor Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background: #f4f1eb; min-height: 100vh; color: #1a1a1a; display: flex; flex-direction: column; }

  /* ── TOP BAR ── */
  .topbar {
    background: #0a2540;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .logo { color: #fff; font-family: 'DM Serif Display', serif; font-size: 22px; }
  .logo span { color: #00c9a7; }
  .logo small { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #8fa3bc; font-weight: 400; margin-left: 10px; letter-spacing: 0.5px; }

  /* ── MAIN LAYOUT ── */
  .main { display: grid; grid-template-columns: 340px 1fr; flex: 1; height: calc(100vh - 53px); }

  /* ── SIDEBAR ── */
  .sidebar { background: #fff; border-right: 1px solid #e8e3d8; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 18px 18px 12px; border-bottom: 1px solid #e8e3d8; }
  .sidebar-header h2 { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.8px; }
  .profile-list { padding: 10px; overflow-y: auto; flex: 1; }
  .profile-btn {
    width: 100%; background: none; border: 1px solid transparent;
    border-radius: 10px; padding: 10px 12px; cursor: pointer;
    text-align: left; display: flex; align-items: center; gap: 10px;
    margin-bottom: 5px; transition: all 0.15s;
  }
  .profile-btn:hover { background: #f8f6f0; border-color: #e8e3d8; }
  .profile-btn.active { background: #f0faf7; border-color: #00c9a7; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .profile-name { font-size: 13px; font-weight: 500; color: #1a1a1a; display: block; }
  .profile-sub { font-size: 11px; color: #8b7355; display: block; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── PROFILE CARD ── */
  .profile-card { padding: 14px 16px; border-top: 1px solid #e8e3d8; font-size: 12px; overflow-y: auto; max-height: 50vh; }
  .card-name { font-size: 16px; font-weight: 500; color: #0a2540; margin-bottom: 2px; }
  .card-sub { font-size: 11px; color: #6b7280; margin-bottom: 12px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
  .stat { background: #f8f6f0; border-radius: 7px; padding: 8px 10px; }
  .stat-label { font-size: 10px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
  .stat-val { font-size: 12px; font-weight: 500; color: #0a2540; }
  .section-label { font-size: 10px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
  .tag { display: inline-block; background: #e8f4f1; color: #0a7a5e; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; margin: 2px 2px 2px 0; }
  .goal-item { display: flex; align-items: flex-start; gap: 5px; margin-bottom: 3px; color: #4a4a4a; }
  .goal-dot { width: 4px; height: 4px; border-radius: 50%; background: #00c9a7; margin-top: 4px; flex-shrink: 0; }
  .bio-text { font-size: 12px; color: #4a4a4a; line-height: 1.65; margin-bottom: 10px; border-left: 3px solid #00c9a7; padding-left: 10px; }
  .suit-section { margin-top: 10px; border-top: 1px solid #e8e3d8; padding-top: 10px; }
  .suit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .suit-item { padding: 5px 8px; background: #faf8f4; border-radius: 5px; }
  .suit-item.full { grid-column: 1 / -1; }
  .suit-label { font-size: 9px; color: #8b7355; text-transform: uppercase; letter-spacing: 0.4px; }
  .suit-val { font-size: 11px; font-weight: 500; color: #0a2540; }
  .suit-val.flag { color: #c0392b; }

  /* ── GAMEPLAN MODAL ── */
  .gp-overlay {
    display: none; position: fixed; inset: 0; background: rgba(10,37,64,0.5);
    z-index: 200; align-items: center; justify-content: center;
  }
  .gp-overlay.open { display: flex; }
  .gp-modal {
    background: #fff; border-radius: 16px; width: 90vw; max-width: 720px;
    max-height: 88vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden;
  }
  .gp-header {
    background: #0a2540; color: #fff; padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .gp-header h2 { font-size: 16px; font-weight: 500; }
  .gp-header h2 span { color: #00c9a7; }
  .gp-close {
    background: none; border: none; color: #8fa3bc; font-size: 22px;
    cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  .gp-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .gp-body { overflow-y: auto; padding: 24px; flex: 1; }
  .gp-priority {
    background: #f0faf7; border: 1px solid #c3e8de; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 20px; font-size: 12px; color: #0a6b50; line-height: 1.6;
  }
  .gp-priority strong { color: #0a2540; }

  /* Steps */
  .gp-steps { position: relative; padding-left: 28px; }
  .gp-steps::before {
    content: ''; position: absolute; left: 11px; top: 0; bottom: 0;
    width: 2px; background: #e8e3d8;
  }
  .gp-step {
    position: relative; margin-bottom: 20px; cursor: pointer;
    border: 1px solid #e8e3d8; border-radius: 10px; padding: 14px 16px;
    transition: all 0.2s;
  }
  .gp-step:hover { border-color: #00c9a7; background: #fafef9; }
  .gp-step.expanded { background: #fafef9; border-color: #00c9a7; }
  .gp-num {
    position: absolute; left: -28px; top: 14px;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; z-index: 1;
  }
  .gp-num.done { background: #00c9a7; color: #fff; }
  .gp-num.active { background: #0a2540; color: #fff; }
  .gp-num.pending { background: #e8e3d8; color: #8b7355; }
  .gp-step-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .gp-step-title { font-size: 14px; font-weight: 500; color: #0a2540; }
  .gp-badge {
    font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0;
  }
  .gp-badge.done { background: #d4f0e8; color: #0a6b50; }
  .gp-badge.active { background: #dce8fb; color: #1a4a8a; }
  .gp-badge.pending { background: #f4f1eb; color: #8b7355; }
  .gp-step-date { font-size: 11px; color: #8b7355; margin-top: 2px; }
  .gp-step-detail {
    display: none; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #e8e3d8;
  }
  .gp-step.expanded .gp-step-detail { display: block; }
  .gp-step-desc { font-size: 12px; color: #4a4a4a; line-height: 1.65; margin-bottom: 10px; }
  .gp-progress-wrap { margin-bottom: 8px; }
  .gp-progress-bar {
    height: 6px; background: #e8e3d8; border-radius: 3px; overflow: hidden;
  }
  .gp-progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .gp-progress-fill.done { background: #00c9a7; }
  .gp-progress-fill.active { background: #1a4a8a; }
  .gp-progress-fill.pending { background: #c9c2b4; }
  .gp-meta { font-size: 11px; color: #8b7355; display: flex; gap: 14px; flex-wrap: wrap; }

  /* Chart */
  .gp-chart { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e8e3d8; }
  .gp-chart h3 { font-size: 13px; font-weight: 500; color: #0a2540; margin-bottom: 12px; }
  .gp-chart svg { width: 100%; height: 220px; }
  .gp-chart-area { fill: url(#areaGrad); }
  .gp-chart-line { fill: none; stroke: #00c9a7; stroke-width: 2.5; }
  .gp-chart-dot { fill: #00c9a7; }
  .gp-chart-label { font-size: 10px; fill: #8b7355; font-family: 'DM Sans', sans-serif; }
  .gp-chart-val { font-size: 9px; fill: #0a2540; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .gp-chart-zero { stroke: #ccc; stroke-width: 1; stroke-dasharray: 4 3; }
  .gp-chart-grid { stroke: #f0ede6; stroke-width: 1; }

  /* Gameplan button */
  .gp-open-btn {
    width: 100%; margin-top: 10px; padding: 9px; border-radius: 8px;
    border: 1px solid #00c9a7; background: #f0faf7; color: #0a6b50;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .gp-open-btn:hover { background: #00c9a7; color: #fff; }

  /* ── CHAT AREA ── */
  .chat-area { display: flex; flex-direction: column; background: #f4f1eb; }
  .chat-header { background: #fff; border-bottom: 1px solid #e8e3d8; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
  .chat-header-info h3 { font-size: 14px; font-weight: 500; color: #0a2540; }
  .chat-header-info p { font-size: 11px; color: #6b7280; }
  .status-badge { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: #00a88a; font-weight: 500; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #00c9a7; }
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 24px; }
  .empty-title { font-size: 16px; font-weight: 500; color: #0a2540; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: #8b7355; line-height: 1.6; max-width: 280px; margin-bottom: 18px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .sugg-btn {
    background: #fff; border: 1px solid #e8e3d8; border-radius: 20px;
    padding: 7px 13px; font-size: 12px; color: #0a2540; cursor: pointer; transition: all 0.15s;
  }
  .sugg-btn:hover { background: #f0faf7; border-color: #00c9a7; color: #0a7a5e; }
  .msg { display: flex; gap: 8px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }
  .bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.65; white-space: pre-wrap; }
  .msg.ai .bubble { background: #fff; border: 1px solid #e8e3d8; color: #1a1a1a; border-bottom-left-radius: 3px; }
  .msg.user .bubble { background: #0a2540; color: #fff; border-bottom-right-radius: 3px; }
  .msg-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .ai-av { background: #e8f4f1; color: #0a7a5e; }
  .user-av { background: #e8e3d8; color: #555; }
  .typing { display: flex; gap: 4px; padding: 10px 14px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  .disclaimer { font-size: 10px; color: #aaa; text-align: center; padding: 5px 20px; background: #fff; border-top: 1px solid #e8e3d8; }
  .input-row { background: #fff; border-top: 1px solid #e8e3d8; padding: 12px 20px; display: flex; gap: 8px; align-items: flex-end; }
  .chat-input {
    flex: 1; border: 1px solid #e8e3d8; border-radius: 9px;
    padding: 9px 13px; font-size: 13px; resize: none; outline: none;
    color: #1a1a1a; background: #fafaf8; line-height: 1.5; max-height: 90px;
  }
  .chat-input:focus { border-color: #00c9a7; background: #fff; }
  .send-btn {
    background: #0a2540; color: #fff; border: none; border-radius: 9px;
    padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .no-profile { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #8b7355; gap: 8px; font-size: 13px; }
</style>
</head>

let current = null;

const fmt = n => '$' + n.toLocaleString();
const debtTotal = p => Object.values(p.debt).reduce((a, b) => a + b, 0);

/* ─────────────────────────────────────────
   SUGGESTED QUESTIONS
───────────────────────────────────────── */
function getSuggestions(p) {
  const base = [
    "Should I open a Roth IRA?",
    "How do I pay off my debt faster?",
    "Am I saving enough for retirement?",
    "What's my debt-to-income ratio?"
  ];
  if (p.own) base.push("Should I refinance my mortgage?");
  else base.push("Am I ready to buy a home?");
  if (p.accs.some(a => a.includes('401'))) base.push("Should I increase my 401(k) contribution?");
  return base.slice(0, 4);
}

/* ─────────────────────────────────────────
   SELECT PROFILE
───────────────────────────────────────── */
function pickProfile(id) {
  current = PROFILES.find(p => p.id === id);
  messages = [];
  renderList();
  renderCard(current);
  renderChat();
}

/* ─────────────────────────────────────────
   RENDER CHAT
───────────────────────────────────────── */
function renderChat() {
  const area = document.getElementById('chatArea');
  if (!current) {
    area.innerHTML = `<div class="no-profile"><div style="font-size:32px;opacity:0.25">👤</div><div style="font-weight:500;color:#0a2540">Select a member profile</div><div>to start an AI-powered financial conversation</div></div>`;
    return;
  }
  const p = current;
  const suggs = getSuggestions(p);
  area.innerHTML = `
    <div class="chat-header">
      <div class="avatar" style="background:${p.bg};color:${p.fg};width:32px;height:32px;font-size:11px">${p.ini}</div>
      <div class="chat-header-info">
        <h3>${p.name}</h3>
        <p>${p.job} · ${fmt(p.inc)}/yr · ${p.own ? 'Homeowner' : 'Renter'}</p>
      </div>
      <div class="status-badge"><div class="status-dot"></div>AI Advisor Active</div>
    </div>
    <div class="messages" id="messages">
      ${messages.length === 0
        ? `<div class="empty-state">
            <div class="empty-title">Ask ${p.name.split(' ')[0]} anything</div>
            <div class="empty-sub">The AI advisor has their full financial profile and gives specific, personalized guidance.</div>
            <div class="suggestions">${suggs.map(s => `<button class="sugg-btn" onclick="sendMessage('${s}')">${s}</button>`).join('')}</div>
           </div>`
        : messages.map(m => `
            <div class="msg ${m.role === 'user' ? 'user' : 'ai'}">
              ${m.role !== 'user' ? `<div class="msg-av ai-av">AI</div>` : ''}
              <div class="bubble">${m.content}</div>
              ${m.role === 'user' ? `<div class="msg-av user-av">You</div>` : ''}
            </div>`).join('')}
      ${loading ? `<div class="msg ai"><div class="msg-av ai-av">AI</div><div class="bubble" style="background:#fff;border:1px solid #e8e3d8"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>` : ''}
    </div>
    <div class="disclaimer">For educational purposes only · Not professional financial advice</div>
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask about ${p.name.split(' ')[0]}'s finances..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" ${loading ? 'disabled' : ''}>Send ↑</button>
    </div>`;

  const msgs = document.getElementById('messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

/* ─────────────────────────────────────────
   SEND MESSAGE & CALL CLAUDE API
───────────────────────────────────────── */
async function sendMessage(text) {
  const input = document.getElementById('chatInput');
  const userText = text || (input && input.value.trim());

  if (!userText || loading) return;
  if (input) input.value = '';

  const p = current;
  messages.push({ role: 'user', content: userText });
  loading = true;
  renderChat();

  /* ── SYSTEM PROMPT — controls how Claude responds ── */
  const systemPrompt = `You are a knowledgeable, empathetic AI financial advisor for Wealth Box. Your job is to give this specific member personalized, actionable financial guidance based on their exact financial situation.

MEMBER PROFILE:
- Name: ${p.name}
- Age: ${p.age}
- Occupation: ${p.job}
- Marital Status: ${p.status}
- Household Size: ${p.hh}
- Annual Income: ${fmt(p.inc)}
- Homeowner: ${p.own ? 'Yes' : 'No'}
- Debt: ${Object.entries(p.debt).map(([k, v]) => `${k}: ${fmt(v)}`).join(', ')} | Total: ${fmt(debtTotal(p))}
- Accounts: ${p.accs.join(', ')}
- Financial Goals: ${p.goals.join('; ')}
- Background Story: ${p.bio}

SUITABILITY REVIEW (MUST CHECK BEFORE EVERY RECOMMENDATION):
- Risk Tolerance: ${p.suitability.riskTolerance}
- Investment Experience: ${p.suitability.investmentExperience}
- Investment Objective: ${p.suitability.investmentObjective}
- Time Horizon: ${p.suitability.timeHorizon}
- Liquid Net Worth: ${fmt(p.suitability.liquidNetWorth)}
- Total Net Worth: ${fmt(p.suitability.totalNetWorth)}
- Monthly Expenses: ${fmt(p.suitability.monthlyExpenses)}
- Emergency Fund: ${p.suitability.emergencyFund}
- Tax Bracket: ${p.suitability.taxBracket}
- Filing Status: ${p.suitability.filingStatus}
- Dependents: ${p.suitability.dependents}
- Life Insurance: ${p.suitability.hasLifeInsurance}
- Disability Insurance: ${p.suitability.hasDisabilityInsurance}
- Estate Plan: ${p.suitability.hasEstatePlan}
- Employment Stability: ${p.suitability.employmentStability}
- Accredited Investor: ${p.suitability.accreditedInvestor}
- Special Circumstances: ${p.suitability.specialCircumstances}

PRIORITY ORDER FOR MONEY DECISIONS (follow this exact sequence when advising):
1. Emergency Fund — 3-6 months of expenses in a HYSA. Non-negotiable first step.
2. 401(k) Employer Match — contribute just enough to capture the full match. It's free money with a deadline.
3. High-Interest Debt (9%+) — credit cards, personal loans. Costs more than the market returns. Attack aggressively.
4. HSA (if eligible) — triple tax advantage: deductible now, grows tax-free, tax-free for medical. After 65 it's a bonus IRA.
5. Roth IRA — after-tax money in, grows tax-free, comes out tax-free. $7,000/yr limit (2025). Essential for long-term wealth.
6. Max 401(k) — go back and push to the $23,500/yr cap. Roth 401(k) preferred if available.
7. Mega Backdoor Roth — if their plan allows after-tax contributions + in-plan conversion. Advanced but powerful.
8. Taxable Brokerage — low-cost index funds, tax-efficient. No contribution limits, no age restrictions.
9. 529 Plans (if kids) — fund education savings AFTER retirement is on track. You can borrow for college, not retirement.

IMPORTANT: If a member asks about a later step (e.g., "should I max my 401(k)?") but hasn't completed earlier steps (e.g., no emergency fund, high CC debt), redirect them to the earlier priority FIRST and explain WHY.

COMPLIANCE RULES — follow these before giving any recommendation:
1. NEVER recommend investments that exceed the member's stated risk tolerance
2. NEVER suggest accredited-investor-only products (private equity, hedge funds, etc.) to non-accredited investors
3. If the member has less than 3 months of emergency fund, prioritize building that BEFORE any investing recommendations
4. If the member has no life insurance and has dependents, flag this as a critical gap
5. If the member has no disability insurance, flag this risk — especially if employment stability is variable or physical
6. If the member has no estate plan and has dependents or significant assets, recommend they address this
7. Always consider the member's tax bracket and filing status when recommending account types (Roth vs. Traditional, etc.)
8. Match recommendations to the member's investment experience level — do not assume advanced knowledge
9. Consider time horizon before recommending any asset allocation or strategy
10. Flag any special circumstances that could affect the suitability of a recommendation

Always:
1. Reference their specific numbers (income, debt amounts, accounts they have or lack)
2. Give concrete, actionable next steps
3. Explain the WHY in plain language
4. Flag IRS contribution limits, income eligibility rules, and tax implications
5. Be warm and encouraging given their life situation
6. Use bullet points for clarity
7. Add a brief disclaimer when advice involves significant financial decisions`;

  try {
    const history = messages.slice(0, -1)
      .map(m => ({ role: m.role, content: m.content }));
    history.push({ role: 'user', content: userText });

    const res = await fetch('/api/wealthbox', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        systemPrompt: systemPrompt,
        messages: history
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    messages.push({ role: 'assistant', content: data.content[0].text });

  } catch (err) {
    messages.push({ role: 'assistant', content: '⚠️ Error: ' + err.message + '\n\nPlease try again. If the issue persists, contact support.' });
  }

  loading = false;
  renderChat();
}

function openGameplan() {
  if (!current) return;
  const p = current;
  document.getElementById('gpTitle').innerHTML = `Financial Gameplan: <span>${p.name}</span>`;

  const stepsHtml = p.gameplan.map(s => {
    const pct = s.target > 0 ? Math.min(100, Math.round((s.current / s.target) * 100)) : (s.status === 'done' ? 100 : 0);
    return `
    <div class="gp-step" onclick="this.classList.toggle('expanded')">
      <div class="gp-num ${s.status}">${s.status === 'done' ? '✓' : s.step}</div>
      <div class="gp-step-head">
        <div>
          <div class="gp-step-title">${s.title}</div>
          <div class="gp-step-date">Target: ${s.date}</div>
        </div>
        <span class="gp-badge ${s.status}">${s.status === 'done' ? 'Complete' : s.status === 'active' ? 'In Progress' : 'Upcoming'}</span>
      </div>
      <div class="gp-step-detail">
        <div class="gp-step-desc">${s.desc}</div>
        ${s.target > 0 ? `
          <div class="gp-progress-wrap">
            <div class="gp-progress-bar"><div class="gp-progress-fill ${s.status}" style="width:${pct}%"></div></div>
          </div>
          <div class="gp-meta">
            <span>Target: ${fmt(s.target)}</span>
            <span>Saved: ${fmt(s.current)} (${pct}%)</span>
            ${s.monthly > 0 ? `<span>Monthly: ${fmt(s.monthly)}</span>` : ''}
            ${s.months > 0 ? `<span>~${s.months} months</span>` : ''}
          </div>` : ''}
      </div>
    </div>`;
  }).join('');

  const chartHtml = renderProjectionChart(p.projections);

  document.getElementById('gpBody').innerHTML = `
    <div class="gp-priority">
      <strong>Priority Order:</strong> 1) Emergency Fund → 2) 401(k) Match → 3) Kill High-Interest Debt (9%+) → 4) HSA → 5) Roth IRA → 6) Max 401(k) → 7) Mega Backdoor Roth → 8) Taxable Brokerage → 9) 529 Plans
    </div>
    <div class="gp-steps">${stepsHtml}</div>
    <div class="gp-chart">
      <h3>Net Worth Projection (If Gameplan Is Followed)</h3>
      ${chartHtml}
    </div>`;

  document.getElementById('gpOverlay').classList.add('open');
}

function closeGameplan() {
  document.getElementById('gpOverlay').classList.remove('open');
}

function renderProjectionChart(projections) {
  const pad = { top: 30, right: 20, bottom: 35, left: 55 };
  const w = 660, h = 220;
  const iw = w - pad.left - pad.right;
  const ih = h - pad.top - pad.bottom;

  const vals = projections.map(p => p.netWorth);
  const minV = Math.min(0, ...vals);
  const maxV = Math.max(...vals);
  const range = maxV - minV || 1;

  const xStep = iw / (projections.length - 1);
  const toX = i => pad.left + i * xStep;
  const toY = v => pad.top + ih - ((v - minV) / range) * ih;

  const points = projections.map((p, i) => `${toX(i)},${toY(p.netWorth)}`);
  const linePath = 'M' + points.join(' L');
  const areaPath = linePath + ` L${toX(projections.length - 1)},${toY(minV)} L${toX(0)},${toY(minV)} Z`;

  const zeroY = toY(0);
  const showZero = minV < 0;

  const gridLines = [];
  const gridCount = 4;
  for (let i = 0; i <= gridCount; i++) {
    const v = minV + (range * i / gridCount);
    const y = toY(v);
    gridLines.push(`<line x1="${pad.left}" y1="${y}" x2="${w - pad.right}" y2="${y}" class="gp-chart-grid"/>`);
    const label = v >= 1000 || v <= -1000 ? (v / 1000).toFixed(0) + 'K' : v.toFixed(0);
    gridLines.push(`<text x="${pad.left - 8}" y="${y + 3}" text-anchor="end" class="gp-chart-label">$${label}</text>`);
  }

  const labels = projections.map((p, i) =>
    `<text x="${toX(i)}" y="${h - 8}" text-anchor="middle" class="gp-chart-label">${p.year}</text>`
  ).join('');

  const dots = projections.map((p, i) => {
    const valStr = p.netWorth >= 1000000 ? '$' + (p.netWorth / 1000000).toFixed(1) + 'M'
      : p.netWorth >= 1000 || p.netWorth <= -1000 ? '$' + (p.netWorth / 1000).toFixed(0) + 'K'
      : '$' + p.netWorth;
    return `<circle cx="${toX(i)}" cy="${toY(p.netWorth)}" r="3.5" class="gp-chart-dot"/>
      <text x="${toX(i)}" y="${toY(p.netWorth) - 8}" text-anchor="middle" class="gp-chart-val">${valStr}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c9a7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00c9a7" stop-opacity="0.02"/>
    </linearGradient></defs>
    ${gridLines.join('')}
    ${showZero ? `<line x1="${pad.left}" y1="${zeroY}" x2="${w - pad.right}" y2="${zeroY}" class="gp-chart-zero"/>` : ''}
    <path d="${areaPath}" class="gp-chart-area"/>
    <path d="${linePath}" class="gp-chart-line"/>
    ${dots}
    ${labels}
  </svg>`;
}
